function CoursScreen({ user }) {
  const jours = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const [cours, setCours] = React.useState([]);
  const [enseignants, setEnseignants] = React.useState([]);
  const [groupes, setGroupes] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [view, setView] = React.useState('planning');
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({ groupe_ids: [] });
  const [errors, setErrors] = React.useState({});
  const [fiche, setFiche] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire');

  React.useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    try {
      const [cData, eData, gData] = await Promise.all([
        api('/cours'),
        api('/enseignants'),
        api('/groupes')
      ]);
      setCours(Array.isArray(cData) ? cData : []);
      setEnseignants(Array.isArray(eData) ? eData : []);
      setGroupes(Array.isArray(gData) ? gData : []);
    } catch (e) {
      setCours([]); setEnseignants([]); setGroupes([]);
    } finally {
      setLoading(false);
    }
  };

  const validate = () => {
    const err = {};
    if (!form.matiere?.trim()) err.matiere = "Ce champ est obligatoire.";
    if (!form.jour_semaine && form.jour_semaine !== 0) err.jour_semaine = "Choisissez un jour.";
    if (!form.heure_debut?.trim()) err.heure_debut = "Saisissez l'heure de début.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      const payload = {
        matiere: form.matiere, titre: form.titre || null, description: form.description || null,
        enseignant_id: form.enseignant_id || null, salle: form.salle || null,
        heure_debut: form.heure_debut || null, heure_fin: form.heure_fin || null,
        jour_semaine: form.jour_semaine !== undefined ? form.jour_semaine : null,
        recurrence: form.recurrence || 'ponctuel',
        groupe_ids: form.groupe_ids || [],
        date_debut: form.date_debut || null, date_fin: form.date_fin || null
      };
      if (modal === 'add') {
        const created = await api('/cours', { method: 'POST', body: payload });
        setCours(prev => [...prev, created]);
      } else {
        const updated = await api(`/cours/${form.id}`, { method: 'PUT', body: payload });
        setCours(prev => prev.map(c => c.id === updated.id ? updated : c));
      }
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
    setModal(null); setForm({ groupe_ids: [] }); setErrors({});
  };

  const handleDelete = async (id) => {
    try {
      await api(`/cours/${id}`, { method: 'DELETE' });
      setCours(prev => prev.filter(c => c.id !== id));
    } catch (e) {
      alert(e.message || "Impossible d'archiver ce cours.");
    }
    setConfirmDelete(null);
  };

  const openAdd = () => { setForm({ recurrence: 'hebdomadaire', groupe_ids: [] }); setErrors({}); setModal('add'); };
  const openEdit = (c) => { setForm({ ...c, groupe_ids: (c.groupes || []).map(g=>g.id) }); setErrors({}); setModal('edit'); };
  const toggleGroupe = (gid) => {
    setForm(p => {
      const ids = p.groupe_ids || [];
      return { ...p, groupe_ids: ids.includes(gid) ? ids.filter(id=>id!==gid) : [...ids, gid] };
    });
  };

  const formatHeure = (h) => h ? h.slice(0,5) : '—';
  const jourLabel = (js) => js !== undefined && js !== null ? jours[js] : '—';

  const coursParJour = jours.map((jour, idx) => cours.filter(c => c.jour_semaine === idx).sort((a,b) => (a.heure_debut||'').localeCompare(b.heure_debut||'')));

  if (fiche) return <FicheCours cours={fiche} user={user} onBack={()=>setFiche(null)} onUpdate={(u)=>setCours(prev=>prev.map(c=>c.id===u.id?u:c))} onDelete={(id)=>setCours(prev=>prev.filter(c=>c.id!==id))} />;

  return (
    <div>
      <PageHeader title="Cours & Planning"
        action={
          <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
            <div style={{ display:'flex', background:'var(--beige-dark)', borderRadius:'var(--radius-sm)', padding:3 }}>
              <button onClick={()=>setView('planning')} style={{ padding:'8px 16px', borderRadius:'var(--radius-sm)', border:'none', fontWeight:600, fontSize:'0.9rem', cursor:'pointer', background: view==='planning'?'var(--white)':'transparent', color: view==='planning'?'var(--navy)':'var(--text-muted)', boxShadow: view==='planning'?'var(--shadow)':'none' }}>
                <i className="fa-solid fa-table-columns"></i> Planning
              </button>
              <button onClick={()=>setView('liste')} style={{ padding:'8px 16px', borderRadius:'var(--radius-sm)', border:'none', fontWeight:600, fontSize:'0.9rem', cursor:'pointer', background: view==='liste'?'var(--white)':'transparent', color: view==='liste'?'var(--navy)':'var(--text-muted)', boxShadow: view==='liste'?'var(--shadow)':'none' }}>
                <i className="fa-solid fa-list"></i> Liste
              </button>
            </div>
            {canEdit && <button style={appStyles.btnPrimary} onClick={openAdd}><i className="fa-solid fa-plus"></i> Ajouter un cours</button>}
          </div>
        } />

      {loading ? (
        <div style={{ textAlign:'center', padding:40 }}>
          <i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i>
          <p style={{ marginTop:12, color:'var(--text-muted)' }}>Chargement…</p>
        </div>
      ) : cours.length === 0 ? (
        <AlertBox type="info">Aucun cours trouvé.</AlertBox>
      ) : view === 'planning' ? (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))', gap:14 }}>
          {jours.map((jour, idx) => (
            <div key={jour} style={{ ...appStyles.card, padding:0, overflow:'hidden' }}>
              <div style={{ background:'var(--navy)', color:'#fff', padding:'12px 16px', fontFamily:'Lora, serif', fontWeight:700, fontSize:'1rem' }}>{jour}</div>
              {coursParJour[idx].length === 0 ? (
                <div style={{ padding:'16px', color:'var(--text-muted)', fontSize:'0.9rem', fontStyle:'italic' }}>Aucun cours</div>
              ) : (
                coursParJour[idx].map(c => (
                  <div key={c.id} style={{ padding:'14px 16px', borderBottom:'1px solid var(--border)', cursor:'pointer', transition:'background 0.15s' }}
                       onMouseEnter={e=>e.currentTarget.style.background='var(--beige)'}
                       onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}
                       onClick={()=>setFiche(c)}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                      <div style={{ fontWeight:700, color:'var(--text)', marginBottom:2 }}>{c.matiere}</div>
                      {canEdit && (
                        <div style={{ display:'flex', gap:4 }} onClick={e=>e.stopPropagation()}>
                          <button style={{ background:'none', border:'none', color:'var(--navy)', cursor:'pointer', fontSize:'0.85rem', padding:'2px 4px' }} onClick={()=>openEdit(c)}><i className="fa-solid fa-pen"></i></button>
                          <button style={{ background:'none', border:'none', color:'var(--red)', cursor:'pointer', fontSize:'0.85rem', padding:'2px 4px' }} onClick={()=>setConfirmDelete(c)}><i className="fa-solid fa-trash"></i></button>
                        </div>
                      )}
                    </div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{formatHeure(c.heure_debut)} – {formatHeure(c.heure_fin)}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{c.titre || '—'}</div>
                    <div style={{ marginTop:8, display:'flex', gap:6, flexWrap:'wrap' }}>
                      <span style={appStyles.badge('beige')}><i className="fa-solid fa-door-open"></i> {c.salle || '—'}</span>
                      <span style={appStyles.badge('beige')}><i className="fa-solid fa-chalkboard-user"></i> {c.enseignant_prenom || ''} {c.enseignant_nom || '—'}</span>
                    </div>
                  </div>
                ))
              )}
            </div>
          ))}
        </div>
      ) : (
        <div style={{ ...appStyles.card, padding:0, overflowX:'auto' }}>
          <table style={appStyles.table}>
            <thead>
              <tr>
                <th style={appStyles.th}>Matière</th>
                <th style={appStyles.th}>Titre</th>
                <th style={appStyles.th}>Jour</th>
                <th style={appStyles.th}>Horaire</th>
                <th style={appStyles.th}>Salle</th>
                <th style={appStyles.th}>Enseignant</th>
                <th style={appStyles.th}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {cours.sort((a,b)=> (a.jour_semaine||0)-(b.jour_semaine||0) || (a.heure_debut||'').localeCompare(b.heure_debut||'')).map(c => (
                <tr key={c.id}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--beige)'}
                    onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}
                    onClick={()=>setFiche(c)} style={{ cursor:'pointer' }}>
                  <td style={appStyles.td}><strong>{c.matiere}</strong></td>
                  <td style={appStyles.td}>{c.titre || '—'}</td>
                  <td style={appStyles.td}>{jourLabel(c.jour_semaine)}</td>
                  <td style={appStyles.td}>{formatHeure(c.heure_debut)} – {formatHeure(c.heure_fin)}</td>
                  <td style={appStyles.td}>{c.salle || '—'}</td>
                  <td style={appStyles.td}>{c.enseignant_prenom || ''} {c.enseignant_nom || '—'}</td>
                  <td style={appStyles.td}>
                    <div style={{ display:'flex', gap:8 }} onClick={e=>e.stopPropagation()}>
                      {canEdit && (
                        <button style={{ ...appStyles.btnSecondary, padding:'7px 14px', fontSize:'0.88rem' }} onClick={()=>openEdit(c)}><i className="fa-solid fa-pen"></i></button>
                      )}
                      {canEdit && (
                        <button style={{ padding:'7px 14px', fontSize:'0.88rem', borderRadius:'var(--radius-sm)', border:'2px solid var(--red)', background:'var(--white)', color:'var(--red)', fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6 }} onClick={()=>setConfirmDelete(c)}>
                          <i className="fa-solid fa-trash"></i>
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {modal && (
        <Modal title={modal==='add' ? 'Ajouter un cours' : 'Modifier le cours'} onClose={()=>{ setModal(null); setForm({ groupe_ids: [] }); setErrors({}); }}>
          <FormField label="Matière" required error={errors.matiere}>
            <input style={{ ...appStyles.input, borderColor: errors.matiere ? 'var(--red)' : 'var(--border)' }} value={form.matiere||''} onChange={e=>{ setForm(p=>({...p,matiere:e.target.value})); setErrors(p=>({...p,matiere:''})); }} placeholder="ex : Mathématiques" />
          </FormField>
          <FormField label="Titre">
            <input style={appStyles.input} value={form.titre||''} onChange={e=>setForm(p=>({...p,titre:e.target.value}))} placeholder="ex : Maths CP - Lundi" />
          </FormField>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Jour" required error={errors.jour_semaine}>
              <select style={{ ...appStyles.input, borderColor: errors.jour_semaine ? 'var(--red)' : 'var(--border)' }} value={form.jour_semaine !== undefined ? form.jour_semaine : ''} onChange={e=>{ setForm(p=>({...p,jour_semaine:+e.target.value})); setErrors(p=>({...p,jour_semaine:''})); }}>
                <option value="">— Choisir —</option>
                {jours.map((j,idx)=><option key={idx} value={idx}>{j}</option>)}
              </select>
            </FormField>
            <FormField label="Récurrence">
              <select style={appStyles.input} value={form.recurrence||'hebdomadaire'} onChange={e=>setForm(p=>({...p,recurrence:e.target.value}))}>
                {[{v:'ponctuel',l:'Ponctuel'},{v:'hebdomadaire',l:'Hebdomadaire'},{v:'bimensuel',l:'Bimensuel'},{v:'mensuel',l:'Mensuel'}].map(r=><option key={r.v} value={r.v}>{r.l}</option>)}
              </select>
            </FormField>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Heure début" required error={errors.heure_debut}>
              <input type="time" style={{ ...appStyles.input, borderColor: errors.heure_debut ? 'var(--red)' : 'var(--border)' }} value={form.heure_debut||''} onChange={e=>{ setForm(p=>({...p,heure_debut:e.target.value})); setErrors(p=>({...p,heure_debut:''})); }} />
            </FormField>
            <FormField label="Heure fin">
              <input type="time" style={appStyles.input} value={form.heure_fin||''} onChange={e=>setForm(p=>({...p,heure_fin:e.target.value}))} />
            </FormField>
          </div>
          <FormField label="Enseignant">
            <select style={appStyles.input} value={form.enseignant_id||''} onChange={e=>setForm(p=>({...p,enseignant_id:e.target.value?+e.target.value:null}))}>
              <option value="">— Pas encore assigné —</option>
              {enseignants.map(e=><option key={e.id} value={e.id}>{e.prenom} {e.nom}</option>)}
            </select>
          </FormField>
          <FormField label="Salle">
            <input style={appStyles.input} value={form.salle||''} onChange={e=>setForm(p=>({...p,salle:e.target.value}))} placeholder="ex : Salle A" />
          </FormField>
          <FormField label="Groupes associés">
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:4 }}>
              {groupes.map(g => (
                <label key={g.id} style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', fontSize:'0.95rem', padding:'6px 10px', borderRadius:'var(--radius-sm)', background: (form.groupe_ids||[]).includes(g.id)?'var(--green-light)':'transparent', transition:'background 0.15s' }}>
                  <input type="checkbox" checked={(form.groupe_ids||[]).includes(g.id)} onChange={()=>toggleGroupe(g.id)} />
                  <span>{g.nom} <span style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>({g.niveau})</span></span>
                </label>
              ))}
            </div>
          </FormField>
          <FormField label="Description" hint="Détails ou consignes particulières.">
            <textarea style={{ ...appStyles.input, resize:'vertical', minHeight:80 }} value={form.description||''} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="ex : Apporter le cahier d'exercices." />
          </FormField>
          <div style={{ display:'flex', gap:12, justifyContent:'flex-end', marginTop:8 }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setModal(null); setForm({ groupe_ids: [] }); setErrors({}); }}>Annuler</button>
            <button style={appStyles.btnPrimary} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </Modal>
      )}

      {confirmDelete && (
        <Modal title="Confirmer l'archivage" onClose={()=>setConfirmDelete(null)}>
          <AlertBox type="warning">
            Voulez-vous vraiment archiver le cours <strong>{confirmDelete.matiere}</strong> ?<br />
            Cette action est réversible depuis la base de données.
          </AlertBox>
          <div style={{ display:'flex', gap:12, marginTop:8, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>setConfirmDelete(null)}>Annuler</button>
            <button style={{ ...appStyles.btnPrimary, background:'var(--red)' }} onClick={()=>handleDelete(confirmDelete.id)}>
              <i className="fa-solid fa-trash"></i> Confirmer
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function FicheCours({ cours: initialCours, user, onBack, onUpdate, onDelete }) {
  const [loading, setLoading] = React.useState(true);
  const [cours, setCours] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [errors, setErrors] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [enseignants, setEnseignants] = React.useState([]);
  const [groupes, setGroupes] = React.useState([]);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire');
  const jours = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];

  React.useEffect(() => { loadData(); }, [initialCours.id]);

  const loadData = async () => {
    setLoading(true);
    try {
      const [cData, eData, gData] = await Promise.all([
        api(`/cours/${initialCours.id}`),
        api('/enseignants'),
        api('/groupes')
      ]);
      setCours(cData);
      setEnseignants(Array.isArray(eData) ? eData : []);
      setGroupes(Array.isArray(gData) ? gData : []);
    } catch (e) {
      setCours(initialCours);
    } finally {
      setLoading(false);
    }
  };

  const startEdit = () => {
    setForm({
      matiere: cours.matiere, titre: cours.titre || '', description: cours.description || '',
      enseignant_id: cours.enseignant_id || '', salle: cours.salle || '',
      heure_debut: cours.heure_debut || '', heure_fin: cours.heure_fin || '',
      jour_semaine: cours.jour_semaine !== undefined ? cours.jour_semaine : '',
      recurrence: cours.recurrence || 'hebdomadaire',
      groupe_ids: (cours.groupes || []).map(g => g.id),
      date_debut: cours.date_debut || '', date_fin: cours.date_fin || ''
    });
    setErrors({});
    setEditMode(true);
  };

  const validate = () => {
    const err = {};
    if (!form.matiere?.trim()) err.matiere = "Ce champ est obligatoire.";
    if (!form.jour_semaine && form.jour_semaine !== 0) err.jour_semaine = "Choisissez un jour.";
    if (!form.heure_debut?.trim()) err.heure_debut = "Saisissez l'heure de début.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      const updated = await api(`/cours/${cours.id}`, { method: 'PUT', body: {
        matiere: form.matiere, titre: form.titre || null, description: form.description || null,
        enseignant_id: form.enseignant_id ? +form.enseignant_id : null,
        salle: form.salle || null, heure_debut: form.heure_debut || null, heure_fin: form.heure_fin || null,
        jour_semaine: form.jour_semaine !== '' ? +form.jour_semaine : null,
        recurrence: form.recurrence || 'ponctuel',
        groupe_ids: form.groupe_ids || [],
        date_debut: form.date_debut || null, date_fin: form.date_fin || null
      }});
      setCours(prev => ({ ...prev, ...updated }));
      setEditMode(false);
      setSaved(true);
      setTimeout(()=>setSaved(false), 3000);
      if (onUpdate) onUpdate(updated);
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
  };

  const handleDelete = async () => {
    try {
      await api(`/cours/${cours.id}`, { method: 'DELETE' });
      if (onDelete) onDelete(cours.id);
      onBack();
    } catch (e) {
      alert(e.message || "Impossible d'archiver ce cours.");
    }
    setConfirmDelete(false);
  };

  const toggleGroupe = (gid) => {
    setForm(p => {
      const ids = p.groupe_ids || [];
      return { ...p, groupe_ids: ids.includes(gid) ? ids.filter(id=>id!==gid) : [...ids, gid] };
    });
  };

  const formatHeure = (h) => h ? h.slice(0,5) : '—';
  const jourLabel = (js) => js !== undefined && js !== null ? jours[js] : '—';
  const recLabel = (r) => ({ ponctuel:'Ponctuel', hebdomadaire:'Hebdomadaire', bimensuel:'Bimensuel', mensuel:'Mensuel' }[r] || r);

  if (loading) {
    return (
      <div style={{ textAlign:'center', padding:40 }}>
        <i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i>
        <p style={{ marginTop:12, color:'var(--text-muted)' }}>Chargement de la fiche…</p>
      </div>
    );
  }

  const coursGroupes = cours?.groupes || [];
  const coursEleves = cours?.eleves || [];
  const ens = cours.enseignant_id ? enseignants.find(e=>e.id===cours.enseignant_id) : null;

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, flexWrap:'wrap' }}>
        <button style={appStyles.btnSecondary} onClick={onBack}>
          <i className="fa-solid fa-arrow-left"></i> Retour
        </button>
        {canEdit && !editMode && (
          <button style={appStyles.btnSecondary} onClick={startEdit}>
            <i className="fa-solid fa-pen"></i> Modifier
          </button>
        )}
        {canEdit && !editMode && (
          <button style={{ ...appStyles.btnSecondary, borderColor:'var(--red)', color:'var(--red)' }} onClick={()=>setConfirmDelete(true)}>
            <i className="fa-solid fa-trash"></i> Archiver
          </button>
        )}
      </div>

      {saved && <AlertBox type="success">Modifications enregistrées avec succès.</AlertBox>}

      <div style={appStyles.card}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:20, flexWrap:'wrap' }}>
          <div style={{ width:72, height:72, borderRadius:'50%', background:'var(--navy)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', flexShrink:0, fontFamily:'Lora, serif', fontSize:'1.6rem', fontWeight:700 }}>
            <i className="fa-solid fa-book-open" style={{ fontSize:'1.8rem' }}></i>
          </div>
          <div style={{ flex:1 }}>
            <h2 style={{ fontFamily:'Lora, serif', fontSize:'1.6rem', color:'var(--navy)' }}>{cours.matiere}</h2>
            <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginTop:8 }}>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-calendar-day"></i> {jourLabel(cours.jour_semaine)}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-clock"></i> {formatHeure(cours.heure_debut)} – {formatHeure(cours.heure_fin)}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-door-open"></i> {cours.salle || '—'}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-chalkboard-user"></i> {ens ? (ens.prenom + ' ' + ens.nom) : 'Non assigné'}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-rotate"></i> {recLabel(cours.recurrence)}</span>
            </div>
          </div>
        </div>
      </div>

      {editMode ? (
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Modifier le cours</h3>
          <FormField label="Matière" required error={errors.matiere}>
            <input style={{ ...appStyles.input, borderColor: errors.matiere?'var(--red)':'var(--border)' }} value={form.matiere||''} onChange={e=>{ setForm(p=>({...p,matiere:e.target.value})); setErrors(p=>({...p,matiere:''})); }} />
          </FormField>
          <FormField label="Titre">
            <input style={appStyles.input} value={form.titre||''} onChange={e=>setForm(p=>({...p,titre:e.target.value}))} placeholder="ex : Maths CP - Lundi" />
          </FormField>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Jour" required error={errors.jour_semaine}>
              <select style={{ ...appStyles.input, borderColor: errors.jour_semaine?'var(--red)':'var(--border)' }} value={form.jour_semaine} onChange={e=>{ setForm(p=>({...p,jour_semaine:+e.target.value})); setErrors(p=>({...p,jour_semaine:''})); }}>
                <option value="">— Choisir —</option>
                {jours.map((j,idx)=><option key={idx} value={idx}>{j}</option>)}
              </select>
            </FormField>
            <FormField label="Récurrence">
              <select style={appStyles.input} value={form.recurrence||'hebdomadaire'} onChange={e=>setForm(p=>({...p,recurrence:e.target.value}))}>
                {[{v:'ponctuel',l:'Ponctuel'},{v:'hebdomadaire',l:'Hebdomadaire'},{v:'bimensuel',l:'Bimensuel'},{v:'mensuel',l:'Mensuel'}].map(r=><option key={r.v} value={r.v}>{r.l}</option>)}
              </select>
            </FormField>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Heure début" required error={errors.heure_debut}>
              <input type="time" style={{ ...appStyles.input, borderColor: errors.heure_debut?'var(--red)':'var(--border)' }} value={form.heure_debut||''} onChange={e=>{ setForm(p=>({...p,heure_debut:e.target.value})); setErrors(p=>({...p,heure_debut:''})); }} />
            </FormField>
            <FormField label="Heure fin">
              <input type="time" style={appStyles.input} value={form.heure_fin||''} onChange={e=>setForm(p=>({...p,heure_fin:e.target.value}))} />
            </FormField>
          </div>
          <FormField label="Enseignant">
            <select style={appStyles.input} value={form.enseignant_id||''} onChange={e=>setForm(p=>({...p,enseignant_id:e.target.value}))}>
              <option value="">— Pas encore assigné —</option>
              {enseignants.map(e=><option key={e.id} value={e.id}>{e.prenom} {e.nom}</option>)}
            </select>
          </FormField>
          <FormField label="Salle">
            <input style={appStyles.input} value={form.salle||''} onChange={e=>setForm(p=>({...p,salle:e.target.value}))} placeholder="ex : Salle A" />
          </FormField>
          <FormField label="Groupes associés">
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:4 }}>
              {groupes.map(g => (
                <label key={g.id} style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', fontSize:'0.95rem', padding:'6px 10px', borderRadius:'var(--radius-sm)', background: (form.groupe_ids||[]).includes(g.id)?'var(--green-light)':'transparent', transition:'background 0.15s' }}>
                  <input type="checkbox" checked={(form.groupe_ids||[]).includes(g.id)} onChange={()=>toggleGroupe(g.id)} />
                  <span>{g.nom} <span style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>({g.niveau})</span></span>
                </label>
              ))}
            </div>
          </FormField>
          <FormField label="Description">
            <textarea style={{ ...appStyles.input, resize:'vertical', minHeight:80 }} value={form.description||''} onChange={e=>setForm(p=>({...p,description:e.target.value}))} />
          </FormField>
          <div style={{ display:'flex', gap:12, marginTop:20, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setEditMode(false); setErrors({}); }}>Annuler</button>
            <button style={appStyles.btnPrimary} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </div>
      ) : (
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Informations</h3>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:12 }}>
            {[ ["Matière", cours.matiere, "book-open"], ["Titre", cours.titre || '—', "heading"], ["Jour", jourLabel(cours.jour_semaine), "calendar-day"], ["Horaire", formatHeure(cours.heure_debut) + ' – ' + formatHeure(cours.heure_fin), "clock"], ["Salle", cours.salle || '—', "door-open"], ["Enseignant", ens ? (ens.prenom + ' ' + ens.nom) : 'Non assigné', "chalkboard-user"], ["Récurrence", recLabel(cours.recurrence), "rotate"], ["Description", cours.description || '—', "align-left"] ].map(([k,v,ico])=>(
              <div key={k} style={{ display:'flex', flexDirection:'column', gap:4, padding:'10px 14px', background:'var(--beige)', borderRadius:'var(--radius-sm)' }}>
                <span style={{ color:'var(--text-muted)', fontSize:'0.85rem', display:'flex', alignItems:'center', gap:6 }}>
                  <i className={`fa-solid fa-${ico}`} style={{ width:14 }}></i>{k}
                </span>
                <span style={{ fontWeight:600, fontSize:'1rem' }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))', gap:16, marginTop:16 }}>
        {/* GROUPES */}
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Groupes associés ({coursGroupes.length})</h3>
          {coursGroupes.length === 0 ? (
            <AlertBox type="info">Aucun groupe associé à ce cours.</AlertBox>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {coursGroupes.map(g => (
                <div key={g.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{g.nom}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{g.niveau} · {g.type || 'niveau'}</div>
                  </div>
                  <span style={appStyles.badge('beige')}><i className="fa-solid fa-users"></i> {g.description || '—'}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ÉLÈVES INDIVIDUELS */}
        {coursEleves.length > 0 && (
          <div style={appStyles.card}>
            <h3 style={appStyles.sectionTitle}>Élèves individuels ({coursEleves.length})</h3>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {coursEleves.map(e => (
                <div key={e.id} style={{ display:'flex', alignItems:'center', gap:12, paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div style={{ width:36, height:36, borderRadius:'50%', background:'var(--navy)', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:'0.85rem' }}>
                    {e.prenom?.[0]}{e.nom?.[0]}
                  </div>
                  <div>
                    <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{e.prenom} {e.nom}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{e.niveau_scolaire || '—'}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {confirmDelete && (
        <Modal title="Confirmer l'archivage" onClose={()=>setConfirmDelete(false)}>
          <AlertBox type="warning">
            Voulez-vous vraiment archiver le cours <strong>{cours.matiere}</strong> ?<br />
            Cette action est réversible depuis la base de données.
          </AlertBox>
          <div style={{ display:'flex', gap:12, marginTop:8, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>setConfirmDelete(false)}>Annuler</button>
            <button style={{ ...appStyles.btnPrimary, background:'var(--red)' }} onClick={handleDelete}>
              <i className="fa-solid fa-trash"></i> Confirmer
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── BULLETINS ─────────────────────────────────────────────────────────────
function BulletinsScreen({ user }) {
  const [eleves, setEleves] = React.useState([]);
  const [search, setSearch] = React.useState('');
  const [annee, setAnnee] = React.useState('2025-2026');
  const [trimestre, setTrimestre] = React.useState(2);
  const [selectedEleve, setSelectedEleve] = React.useState(null);
  const [bulletin, setBulletin] = React.useState(null);
  const [evolution, setEvolution] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({});
  const [errors, setErrors] = React.useState({});
  const [coursList, setCoursList] = React.useState([]);
  const [coursForEleve, setCoursForEleve] = React.useState([]);
  const [saved, setSaved] = React.useState(false);
  const [eleveSearch, setEleveSearch] = React.useState('');
  const [selectedNoteEleve, setSelectedNoteEleve] = React.useState(null);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire' || user.role === 'enseignant');
  const canDeleteNote = user && (user.role === 'admin' || user.role === 'enseignant');

  const currentYear = new Date().getFullYear();
  const annees = Array.from({ length: 5 }, (_, i) => {
    const y = currentYear - 2 + i;
    return `${y}-${y + 1}`;
  });

  React.useEffect(() => { loadEleves(); loadCours(); }, []);

  React.useEffect(() => {
    if (selectedNoteEleve) {
      api(`/eleves/${selectedNoteEleve.id}/cours`).then(data => {
        setCoursForEleve(Array.isArray(data) ? data : []);
      }).catch(() => setCoursForEleve([]));
    } else {
      setCoursForEleve([]);
    }
  }, [selectedNoteEleve]);

  const loadEleves = async () => {
    setLoading(true);
    try {
      const data = await api('/eleves?statut=actif');
      setEleves(Array.isArray(data) ? data : []);
    } catch (e) { setEleves([]); }
    finally { setLoading(false); }
  };

  const loadCours = async () => {
    try {
      const data = await api('/cours');
      setCoursList(Array.isArray(data) ? data : []);
    } catch (e) { setCoursList([]); }
  };

  const loadBulletinRef = React.useRef(0);

  const loadBulletin = async (el, a = annee, t = trimestre) => {
    const reqId = ++loadBulletinRef.current;
    setLoading(true);
    try {
      const [bData, eData] = await Promise.all([
        api(`/notes/bulletin?eleve_id=${el.id}&annee_scolaire=${a}&trimestre=${t}`),
        api(`/notes/evolution?eleve_id=${el.id}`)
      ]);
      if (reqId !== loadBulletinRef.current) return; // garde race condition
      setBulletin(bData);
      setEvolution(Array.isArray(eData) ? eData : []);
    } catch (e) {
      if (reqId !== loadBulletinRef.current) return;
      setBulletin({ eleve: el, annee_scolaire: a, trimestre: t, notes: [], moyenne: null });
      setEvolution([]);
    } finally { if (reqId === loadBulletinRef.current) setLoading(false); }
  };

  const handleSelectEleve = (el) => {
    setSelectedEleve(el);
    loadBulletin(el);
  };

  const validate = () => {
    const err = {};
    if (!form.eleve_id) err.eleve_id = "Sélectionnez un élève.";
    if (!form.cours_id) err.cours_id = "Sélectionnez un cours.";
    const val = form.valeur;
    if (val === undefined || val === '' || isNaN(val) || val < 0 || val > 20) err.valeur = "Saisissez une note entre 0 et 20.";
    if (!form.trimestre) err.trimestre = "Choisissez un trimestre.";
    if (!form.annee_scolaire?.trim()) err.annee_scolaire = "Saisissez l'année scolaire.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      const payload = {
        eleve_id: +form.eleve_id, cours_id: +form.cours_id,
        valeur: form.valeur !== '' ? +form.valeur : null,
        appreciation: form.appreciation || null,
        trimestre: +form.trimestre, annee_scolaire: form.annee_scolaire,
        date_evaluation: form.date_evaluation || new Date().toISOString().split('T')[0]
      };
      if (modal === 'add') {
        await api('/notes', { method: 'POST', body: payload });
      } else {
        await api(`/notes/${form.id}`, { method: 'PUT', body: payload });
      }
      setSaved(true); setTimeout(()=>setSaved(false), 4000);
      if (selectedEleve) loadBulletin(selectedEleve);
      setModal(null); setForm({}); setErrors({}); setEleveSearch(''); setSelectedNoteEleve(null);
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('Supprimer cette note ?')) return;
    try {
      await api(`/notes/${id}`, { method: 'DELETE' });
      if (selectedEleve) loadBulletin(selectedEleve);
    } catch (e) {
      alert(e.message || "Impossible de supprimer.");
    }
  };

  const openAdd = () => {
    setForm({ trimestre, annee_scolaire: annee, date_evaluation: new Date().toISOString().split('T')[0], valeur: '' });
    setErrors({}); setModal('add');
  };

  const openEdit = (n) => {
    setForm({
      id: n.id, eleve_id: n.eleve_id, cours_id: n.cours_id,
      valeur: n.valeur ?? '', appreciation: n.appreciation || '',
      trimestre: n.trimestre, annee_scolaire: n.annee_scolaire,
      date_evaluation: n.date_evaluation || new Date().toISOString().split('T')[0]
    });
    const el = eleves.find(e=>e.id===n.eleve_id);
    if (el) { setSelectedNoteEleve(el); setEleveSearch(`${el.prenom} ${el.nom}`); }
    setErrors({}); setModal('edit');
  };

  const downloadPdf = async () => {
    if (!selectedEleve) return;
    let objectUrl = null;
    try {
      const token = localStorage.getItem('admisco_token');
      const res = await fetch(`/api/notes/bulletin/pdf?eleve_id=${selectedEleve.id}&annee_scolaire=${annee}&trimestre=${trimestre}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Erreur serveur');
      const ct = res.headers.get('content-type');
      if (!ct || !ct.includes('application/pdf')) throw new Error('Réponse invalide');
      const blob = await res.blob();
      objectUrl = URL.createObjectURL(blob);
      window.open(objectUrl, '_blank');
      setTimeout(() => { if (objectUrl) URL.revokeObjectURL(objectUrl); }, 60000);
    } catch (e) { alert('Impossible de générer le PDF.'); if (objectUrl) URL.revokeObjectURL(objectUrl); }
  };

  const filteredEleves = eleves.filter(e => (e.nom + ' ' + e.prenom).toLowerCase().includes(search.toLowerCase()));
  const elevesNotes = eleves.filter(e => (e.nom + ' ' + e.prenom).toLowerCase().includes(eleveSearch.toLowerCase()));

  if (selectedEleve) {
    return (
      <div>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, flexWrap:'wrap' }}>
          <button style={appStyles.btnSecondary} onClick={()=>{ setSelectedEleve(null); setBulletin(null); }}>
            <i className="fa-solid fa-arrow-left"></i> Retour
          </button>
          <button style={appStyles.btnSecondary} onClick={downloadPdf}>
            <i className="fa-solid fa-file-pdf"></i> Télécharger PDF
          </button>
          {canEdit && (
            <button style={appStyles.btnPrimary} onClick={openAdd}>
              <i className="fa-solid fa-plus"></i> Ajouter une note
            </button>
          )}
        </div>

        {saved && <AlertBox type="success">Note enregistrée avec succès.</AlertBox>}

        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:14, marginBottom:20 }}>
          <FormField label="Année scolaire">
            <select style={appStyles.input} value={annee} onChange={e=>{ const val = e.target.value; setAnnee(val); loadBulletin(selectedEleve, val, trimestre); }}>
              {annees.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </FormField>
          <FormField label="Trimestre">
            <select style={appStyles.input} value={trimestre} onChange={e=>{ const val = +e.target.value; setTrimestre(val); loadBulletin(selectedEleve, annee, val); }}>
              {[1,2,3].map(t=><option key={t} value={t}>Trimestre {t}</option>)}
            </select>
          </FormField>
        </div>

        {loading ? (
          <div style={{ textAlign:'center', padding:40 }}><i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i></div>
        ) : (
          <>
            <div style={appStyles.card}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:20, flexWrap:'wrap' }}>
                <div style={{ width:72, height:72, borderRadius:'50%', background:'var(--navy)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', flexShrink:0, fontFamily:'Lora, serif', fontSize:'1.6rem', fontWeight:700 }}>
                  {selectedEleve.prenom?.[0]}{selectedEleve.nom?.[0]}
                </div>
                <div style={{ flex:1 }}>
                  <h2 style={{ fontFamily:'Lora, serif', fontSize:'1.6rem', color:'var(--navy)' }}>{selectedEleve.prenom} {selectedEleve.nom}</h2>
                  <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginTop:8 }}>
                    <span style={appStyles.badge('beige')}><i className="fa-solid fa-book-open"></i> {selectedEleve.niveau_scolaire || '—'}</span>
                    <span style={appStyles.badge('beige')}><i className="fa-solid fa-calendar"></i> Année {bulletin?.annee_scolaire || annee}</span>
                    <span style={appStyles.badge('beige')}><i className="fa-solid fa-layer-group"></i> Trimestre {bulletin?.trimestre || trimestre}</span>
                    <span style={appStyles.badge(bulletin?.moyenne === null || bulletin?.moyenne === undefined ? 'beige' : (bulletin.moyenne >= 10 ? 'green' : 'orange'))}>
                      <i className="fa-solid fa-chart-line"></i> Moyenne : {bulletin?.moyenne ?? '—'}/20
                    </span>
                  </div>
                </div>
              </div>
            </div>

            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))', gap:16, marginTop:16 }}>
              <div style={appStyles.card}>
                <h3 style={appStyles.sectionTitle}>Notes du trimestre ({bulletin?.notes?.length || 0})</h3>
                {(bulletin?.notes?.length || 0) === 0 ? (
                  <AlertBox type="info">Aucune note pour ce trimestre.</AlertBox>
                ) : (
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    {bulletin.notes.map(n => (
                      <div key={n.id} style={{ paddingBottom:12, borderBottom:'1px solid var(--border)' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                          <strong style={{ fontSize:'1.05rem' }}>{n.matiere}</strong>
                          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                            <span style={{ background:'var(--navy)', color:'#fff', borderRadius:'var(--radius-sm)', padding:'5px 14px', fontWeight:700, fontSize:'1.1rem' }}>{n.valeur !== null ? n.valeur + '/20' : '—'}</span>
                            {canEdit && (
                              <button style={{ background:'none', border:'none', color:'var(--navy)', cursor:'pointer', fontSize:'0.85rem' }} onClick={()=>openEdit(n)}><i className="fa-solid fa-pen"></i></button>
                            )}
                            {canDeleteNote && (
                              <button style={{ background:'none', border:'none', color:'var(--red)', cursor:'pointer', fontSize:'0.85rem' }} onClick={()=>handleDelete(n.id)}><i className="fa-solid fa-trash"></i></button>
                            )}
                          </div>
                        </div>
                        <div style={{ color:'var(--text-muted)', fontSize:'0.9rem' }}>{n.cours_titre || '—'} · {formatDateFR(n.date_evaluation)}</div>
                        {n.appreciation && <p style={{ color:'var(--text-muted)', fontSize:'0.95rem', fontStyle:'italic', marginTop:4 }}>"{n.appreciation}"</p>}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div style={appStyles.card}>
                <h3 style={appStyles.sectionTitle}>Évolution</h3>
                {evolution.length === 0 ? (
                  <AlertBox type="info">Aucune donnée d'évolution.</AlertBox>
                ) : (
                  <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                    {evolution.map((ev, i) => (
                      <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                        <div>
                          <div style={{ fontWeight:600, fontSize:'0.95rem' }}>Année {ev.annee_scolaire} · Trimestre {ev.trimestre}</div>
                        </div>
                        <span style={{ background:'var(--navy)', color:'#fff', borderRadius:'var(--radius-sm)', padding:'4px 12px', fontWeight:700, fontSize:'1rem' }}>{Number(ev.moyenne).toFixed(2)}/20</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </>
        )}
      </div>
    );
  }

  return (
    <div>
      <PageHeader title="Bulletins de suivi"
        action={canEdit && <button style={appStyles.btnPrimary} onClick={openAdd}><i className="fa-solid fa-pen"></i> Saisir des notes</button>} />

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:14, marginBottom:20 }}>
        <FormField label="Année scolaire">
          <select style={appStyles.input} value={annee} onChange={e=>setAnnee(e.target.value)}>
            {annees.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </FormField>
        <FormField label="Trimestre">
          <select style={appStyles.input} value={trimestre} onChange={e=>setTrimestre(+e.target.value)}>
            {[1,2,3].map(t=><option key={t} value={t}>Trimestre {t}</option>)}
          </select>
        </FormField>
        <FormField label="Rechercher un élève">
          <div style={{ position:'relative' }}>
            <i className="fa-solid fa-magnifying-glass" style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', pointerEvents:'none' }}></i>
            <input style={{ ...appStyles.input, paddingLeft:42 }} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Nom, prénom…" />
          </div>
        </FormField>
      </div>

      {loading ? (
        <div style={{ textAlign:'center', padding:40 }}><i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i></div>
      ) : filteredEleves.length === 0 ? (
        <AlertBox type="info">Aucun élève trouvé.</AlertBox>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))', gap:14 }}>
          {filteredEleves.map(e => (
            <button key={e.id} onClick={()=>handleSelectEleve(e)}
              style={{ ...appStyles.card, cursor:'pointer', textAlign:'left', border:'2px solid var(--border)', transition:'all 0.15s' }}
              onMouseEnter={ev=>{ev.currentTarget.style.borderColor='var(--navy)';ev.currentTarget.style.boxShadow='var(--shadow-lg)';}}
              onMouseLeave={ev=>{ev.currentTarget.style.borderColor='var(--border)';ev.currentTarget.style.boxShadow='var(--shadow)';}}>
              <div style={{ display:'flex', gap:14, alignItems:'center' }}>
                <div style={{ width:48, height:48, borderRadius:'50%', background:'var(--navy)', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, flexShrink:0, fontFamily:'Lora, serif', fontSize:'1.1rem' }}>
                  {e.prenom?.[0]}{e.nom?.[0]}
                </div>
                <div>
                  <div style={{ fontWeight:700 }}>{e.prenom} {e.nom}</div>
                  <div style={{ color:'var(--text-muted)', fontSize:'0.88rem' }}>{e.niveau_scolaire || '—'}</div>
                </div>
              </div>
              <div style={{ marginTop:14, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={appStyles.badge('beige')}><i className="fa-solid fa-file-lines"></i> Voir le bulletin</span>
                <i className="fa-solid fa-chevron-right" style={{ color:'var(--navy)' }}></i>
              </div>
            </button>
          ))}
        </div>
      )}

      {modal && (
        <Modal title={modal==='add' ? 'Saisir une note' : 'Modifier la note'} onClose={()=>{ setModal(null); setForm({}); setErrors({}); setEleveSearch(''); setSelectedNoteEleve(null); }}>
          {modal==='add' && (
            <FormField label="Élève" required error={errors.eleve_id}>
              <div style={{ position:'relative' }}>
                <i className="fa-solid fa-magnifying-glass" style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', pointerEvents:'none' }}></i>
                <input style={{ ...appStyles.input, paddingLeft:42, borderColor: errors.eleve_id ? 'var(--red)' : 'var(--border)' }} value={selectedNoteEleve ? `${selectedNoteEleve.prenom} ${selectedNoteEleve.nom}` : eleveSearch} onChange={e=>{ setEleveSearch(e.target.value); setSelectedNoteEleve(null); setErrors(p=>({...p,eleve_id:''})); }} placeholder="Rechercher un élève…" />
                {!selectedNoteEleve && eleveSearch && (
                  <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, maxHeight:220, overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'var(--white)', zIndex:50, boxShadow:'var(--shadow-lg)' }}>
                    {elevesNotes.length === 0 ? (
                      <div style={{ padding:'12px 16px', color:'var(--text-muted)', fontSize:'0.9rem' }}>Aucun élève trouvé.</div>
                    ) : (
                      elevesNotes.map(el => (
                        <button key={el.id} onClick={()=>{ setSelectedNoteEleve(el); setEleveSearch(`${el.prenom} ${el.nom}`); setForm(p=>({...p,eleve_id:el.id})); }}
                          style={{ display:'block', width:'100%', textAlign:'left', padding:'12px 16px', border:'none', borderBottom:'1px solid var(--border)', background:'transparent', cursor:'pointer' }}
                          onMouseEnter={ev=>ev.currentTarget.style.background='var(--beige)'}
                          onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                          {el.prenom} {el.nom} <span style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>· {el.niveau_scolaire || '—'}</span>
                        </button>
                      ))
                    )}
                  </div>
                )}
              </div>
            </FormField>
          )}
          <FormField label="Cours" required error={errors.cours_id}>
            <select style={{ ...appStyles.input, borderColor: errors.cours_id ? 'var(--red)' : 'var(--border)' }} value={form.cours_id||''} onChange={e=>{ setForm(p=>({...p,cours_id:+e.target.value})); setErrors(p=>({...p,cours_id:''})); }}>
              <option value="">— Choisir —</option>
              {(modal === 'add' && selectedNoteEleve ? coursForEleve : coursList).map(c=><option key={c.id} value={c.id}>{c.matiere} {c.titre ? `— ${c.titre}` : ''}</option>)}
            </select>
          </FormField>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Note /20" required error={errors.valeur}>
              <input type="number" min={0} max={20} step={0.5} style={{ ...appStyles.input, borderColor: errors.valeur ? 'var(--red)' : 'var(--border)' }} value={form.valeur} onChange={e=>{ setForm(p=>({...p,valeur:e.target.value===''?'':+e.target.value})); setErrors(p=>({...p,valeur:''})); }} />
            </FormField>
            <FormField label="Trimestre" required error={errors.trimestre}>
              <select style={{ ...appStyles.input, borderColor: errors.trimestre ? 'var(--red)' : 'var(--border)' }} value={form.trimestre||''} onChange={e=>{ setForm(p=>({...p,trimestre:+e.target.value})); setErrors(p=>({...p,trimestre:''})); }}>
                <option value="">— Choisir —</option>
                {[1,2,3].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </FormField>
          </div>
          <FormField label="Année scolaire" required error={errors.annee_scolaire}>
            <select style={{ ...appStyles.input, borderColor: errors.annee_scolaire ? 'var(--red)' : 'var(--border)' }} value={form.annee_scolaire||''} onChange={e=>{ setForm(p=>({...p,annee_scolaire:e.target.value})); setErrors(p=>({...p,annee_scolaire:''})); }}>
              <option value="">— Choisir —</option>
              {annees.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </FormField>
          <FormField label="Date d'évaluation">
            <input type="date" style={appStyles.input} value={form.date_evaluation||''} onChange={e=>setForm(p=>({...p,date_evaluation:e.target.value}))} />
          </FormField>
          <FormField label="Appréciation">
            <textarea style={{ ...appStyles.input, resize:'vertical', minHeight:80 }} value={form.appreciation||''} onChange={e=>setForm(p=>({...p,appreciation:e.target.value}))} placeholder="Appréciation sur le travail de l'élève…" />
          </FormField>
          <div style={{ display:'flex', gap:12, justifyContent:'flex-end', marginTop:8 }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setModal(null); setForm({}); setErrors({}); setEleveSearch(''); setSelectedNoteEleve(null); }}>Annuler</button>
            <button style={appStyles.btnPrimary} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── COMMUNICATION ─────────────────────────────────────────────────────────
function CommunicationScreen() {
  const [form, setForm] = React.useState({ destinataire:"tous", objet:"", message:"" });
  const [sent, setSent] = React.useState(false);
  const [errors, setErrors] = React.useState({});

  const send = () => {
    const err = {};
    if (!form.objet.trim())   err.objet   = "L'objet du message est obligatoire.";
    if (!form.message.trim()) err.message = "Le message ne peut pas être vide.";
    if (Object.keys(err).length) { setErrors(err); return; }
    setSent(true);
    setForm({ destinataire:"tous", objet:"", message:"" });
    setTimeout(()=>setSent(false), 4000);
  };

  return (
    <div>
      <PageHeader title="Envoyer un message" />
      {sent && <AlertBox type="success">Votre message a bien été envoyé à toutes les familles.</AlertBox>}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))", gap:20 }}>
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Nouveau message</h3>
          <FormField label="Envoyer à" required>
            <select style={appStyles.input} value={form.destinataire} onChange={e=>setForm(p=>({...p,destinataire:e.target.value}))}>
              <option value="tous">Toutes les familles</option>
              {GROUPES.map(g=><option key={g.id} value={g.nom}>Groupe : {g.nom}</option>)}
              {ELEVES.filter(e=>e.statut==="actif").map(e=><option key={e.id} value={e.id}>{e.prenom} {e.nom} (famille)</option>)}
            </select>
          </FormField>
          <FormField label="Objet" required error={errors.objet}>
            <input style={{ ...appStyles.input, borderColor:errors.objet?"var(--red)":"var(--border)" }}
                   value={form.objet} onChange={e=>{ setForm(p=>({...p,objet:e.target.value})); setErrors(p=>({...p,objet:""})); }}
                   placeholder="ex : Fermeture exceptionnelle samedi 10 mai" />
          </FormField>
          <FormField label="Message" required error={errors.message}>
            <textarea style={{ ...appStyles.input, minHeight:120, resize:"vertical", borderColor:errors.message?"var(--red)":"var(--border)" }}
                      value={form.message} onChange={e=>{ setForm(p=>({...p,message:e.target.value})); setErrors(p=>({...p,message:""})); }}
                      placeholder="Écrivez votre message ici…" />
          </FormField>
          <button style={{ ...appStyles.btnPrimary, width:"100%", justifyContent:"center" }} onClick={send}>
            <i className="fa-solid fa-paper-plane"></i> Envoyer le message
          </button>
        </div>
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Messages récents</h3>
          {[
            { date:"28 avr.", objet:"Cours annulé — M. Bernard absent",      dest:"Groupe A & B" },
            { date:"15 avr.", objet:"Rappel : cotisation avril à régler",     dest:"Toutes les familles" },
            { date:"01 avr.", objet:"Reprise des cours après vacances",       dest:"Toutes les familles" },
          ].map((m,i) => (
            <div key={i} style={{ paddingBottom:14, marginBottom:14, borderBottom:"1px solid var(--border)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                <div style={{ fontWeight:600, fontSize:"0.95rem" }}>{m.objet}</div>
                <span style={{ color:"var(--text-muted)", fontSize:"0.82rem", flexShrink:0 }}>{m.date}</span>
              </div>
              <div style={{ color:"var(--text-muted)", fontSize:"0.85rem", marginTop:2, display:"flex", alignItems:"center", gap:5 }}>
                <i className="fa-solid fa-arrow-right" style={{ fontSize:"0.75rem" }}></i>{m.dest}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { key:"dashboard",     icon:"house",             label:"Accueil" },
  { key:"eleves",        icon:"user-graduate",      label:"Élèves" },
  { key:"groupes",       icon:"users",              label:"Groupes" },
  { key:"cours",         icon:"book-open",          label:"Cours" },
  { key:"presences",     icon:"clipboard-check",    label:"Présences" },
  { key:"finances",      icon:"euro-sign",          label:"Paiements" },
  { key:"bulletins",     icon:"file-lines",         label:"Bulletins" },
  { key:"enseignants",   icon:"chalkboard-user",    label:"Enseignants" },
  { key:"communication", icon:"envelope",           label:"Messages" },
];

const PAGE_TITLES = {
  dashboard:"Tableau de bord", eleves:"Élèves", groupes:"Groupes",
  cours:"Cours & Planning", presences:"Présences", finances:"Paiements",
  bulletins:"Bulletins", enseignants:"Enseignants", communication:"Messages"
};

// ─── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = React.useState(null);
  const [page, setPage] = React.useState("dashboard");
  const [menuOpen, setMenuOpen] = React.useState(false);

  React.useEffect(() => {
    const token = localStorage.getItem('admisco_token');
    if (token) {
      __authToken = token;
      api('/auth/me').then(u => setUser(u)).catch(() => { localStorage.removeItem('admisco_token'); __authToken = null; });
    }
  }, []);

  const handleLogin = (u) => setUser(u);
  const handleLogout = () => { setUser(null); localStorage.removeItem('admisco_token'); __authToken = null; };

  const { tweaks, TweaksUI } = useTweaks(/*EDITMODE-BEGIN*/{
    "compactMode": false
  }/*EDITMODE-END*/);

  if (!user) return <LoginScreen onLogin={handleLogin} />;

  const renderPage = () => {
    switch(page) {
      case "eleves":         return <ElevesScreen user={user} />;
      case "groupes":        return <GroupesScreen user={user} />;
      case "cours":          return <CoursScreen user={user} />;
      case "presences":      return <PresencesScreen user={user} />;
      case "finances":       return <FinancesScreen user={user} />;
      case "bulletins":      return <BulletinsScreen user={user} />;
      case "enseignants":    return <EnseignantsScreen />;
      case "communication":  return <CommunicationScreen />;
      default:               return <Dashboard onNav={setPage} />;
    }
  };

  return (
    <>
      {TweaksUI}

      {/* Mobile header */}
      <div style={{ display:"none" }} className="mobile-header">
        <div style={{ background:"var(--navy)", color:"#fff", padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
          <span style={{ fontFamily:"Lora, serif", fontWeight:700, display:"flex", alignItems:"center", gap:10 }}>
            <i className="fa-solid fa-school"></i> Admisco
          </span>
          <button onClick={()=>setMenuOpen(!menuOpen)} style={{ background:"none", border:"none", color:"#fff", fontSize:"1.4rem", cursor:"pointer" }}>
            <i className={`fa-solid fa-${menuOpen?"xmark":"bars"}`}></i>
          </button>
        </div>
        {menuOpen && (
          <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex" }}>
            <div style={{ background:"var(--navy)", width:260, display:"flex", flexDirection:"column", overflowY:"auto" }}>
              <div style={{ padding:"20px 24px", borderBottom:"1px solid rgba(255,255,255,0.12)" }}>
                <span style={{ fontFamily:"Lora, serif", color:"#fff", fontWeight:700, fontSize:"1.1rem" }}>Navigation</span>
              </div>
              {NAV_ITEMS.map(n => (
                <button key={n.key} style={appStyles.navItem(page===n.key)}
                        onClick={()=>{ setPage(n.key); setMenuOpen(false); }}>
                  <i className={`fa-solid fa-${n.icon}`} style={appStyles.navIcon}></i> {n.label}
                </button>
              ))}
            </div>
            <div style={{ flex:1, background:"rgba(0,0,0,0.4)" }} onClick={()=>setMenuOpen(false)} />
          </div>
        )}
      </div>

      {/* Desktop */}
      <div style={appStyles.wrap} className="desktop-layout">
        <aside style={appStyles.sidebar}>
          <div style={appStyles.sidebarLogo}>
            <div style={{ width:40, height:40, background:"rgba(255,255,255,0.15)", borderRadius:"var(--radius-sm)", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:10 }}>
              <i className="fa-solid fa-school" style={{ color:"#fff", fontSize:"1.2rem" }}></i>
            </div>
            <div style={appStyles.sidebarLogoTitle}>Admisco</div>
            <div style={appStyles.sidebarLogoSub}>Mini-École</div>
          </div>
          <nav style={appStyles.sidebarNav}>
            {NAV_ITEMS.map(n => (
              <button key={n.key} style={appStyles.navItem(page===n.key)} onClick={()=>setPage(n.key)}>
                <i className={`fa-solid fa-${n.icon}`} style={appStyles.navIcon}></i>
                {n.label}
              </button>
            ))}
          </nav>
          <div style={{ padding:"16px 24px", borderTop:"1px solid rgba(255,255,255,0.12)" }}>
            <div style={{ color:"rgba(255,255,255,0.6)", fontSize:"0.85rem", marginBottom:10 }}>
              Connecté en tant que<br /><strong style={{ color:"#fff" }}>{user ? (user.prenom + ' ' + user.nom + ' · ' + user.role) : 'Utilisateur'}</strong>
            </div>
            <button onClick={handleLogout}
              style={{ ...appStyles.navItem(false), width:"100%", padding:"10px 0", fontSize:"0.9rem", opacity:0.7 }}>
              <i className="fa-solid fa-right-from-bracket" style={appStyles.navIcon}></i> Se déconnecter
            </button>
          </div>
        </aside>

        <main style={appStyles.main}>
          <div style={appStyles.topbar}>
            <h1 style={appStyles.topbarTitle}>{PAGE_TITLES[page]}</h1>
            <div style={appStyles.topbarUser}>
              <div style={{ width:36, height:36, background:"var(--beige-dark)", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, color:"var(--navy)" }}>
                <i className="fa-solid fa-user" style={{ fontSize:"0.9rem" }}></i>
              </div>
              <span>{user ? (user.prenom + ' ' + user.nom) : 'Admin'}</span>
            </div>
          </div>
          <div style={appStyles.content}>{renderPage()}</div>
        </main>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

// ─── COUCHE API ─────────────────────────────────────────────────────────────
const API_BASE = '';
let __authToken = localStorage.getItem('admisco_token') || null;

async function api(url, opts = {}) {
  const headers = {
    'Content-Type': 'application/json',
    ...(opts.headers || {}),
    ...(__authToken ? { 'Authorization': `Bearer ${__authToken}` } : {})
  };
  const res = await fetch(`${API_BASE}/api${url}`, {
    ...opts,
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Erreur ${res.status}`);
  return data;
}

// ─── CONNEXION ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = React.useState("admin@mini-ecole.fr");
  const [pwd, setPwd] = React.useState("");
  const [err, setErr] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  const handle = async () => {
    if (!email.trim()) { setErr("Veuillez saisir votre identifiant."); return; }
    if (!pwd.trim()) { setErr("Veuillez saisir votre mot de passe."); return; }
    setLoading(true); setErr("");
    try {
      const data = await api('/auth/login', { method: 'POST', body: { email, password: pwd } });
      __authToken = data.token;
      localStorage.setItem('admisco_token', data.token);
      onLogin(data.user);
    } catch (e) {
      setErr(e.message || "Identifiants invalides.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"var(--beige)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ width:"100%", maxWidth:440 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:72, height:72, background:"var(--navy)", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px" }}>
            <i className="fa-solid fa-school" style={{ fontSize:"2rem", color:"#fff" }}></i>
          </div>
          <h1 style={{ fontFamily:"Lora, serif", color:"var(--navy)", fontSize:"2rem", fontWeight:700 }}>Admisco</h1>
          <p style={{ color:"var(--text-muted)", marginTop:6, fontSize:"1rem" }}>Gestion de la mini-école</p>
        </div>
        <div style={{ ...appStyles.card, padding:32 }}>
          <h2 style={{ fontFamily:"Lora, serif", color:"var(--navy)", marginBottom:24, fontSize:"1.3rem" }}>Connexion</h2>
          {err && <AlertBox type="error">{err}</AlertBox>}
          <FormField label="Votre identifiant" required>
            <input style={appStyles.input} value={email} onChange={e=>{ setEmail(e.target.value); setErr(""); }}
                   placeholder="ex : admin@mini-ecole.fr" onKeyDown={e=>e.key==="Enter"&&handle()} />
          </FormField>
          <FormField label="Votre mot de passe" required>
            <input style={appStyles.input} type="password" value={pwd} onChange={e=>{ setPwd(e.target.value); setErr(""); }}
                   placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handle()} />
          </FormField>
          <button style={{ ...appStyles.btnPrimary, width:"100%", justifyContent:"center", marginTop:8, padding:"15px 24px", fontSize:"1.1rem" }}
                  onClick={handle} disabled={loading}>
            {loading
              ? <><i className="fa-solid fa-spinner fa-spin"></i> Connexion en cours…</>
              : <><i className="fa-solid fa-arrow-right-to-bracket"></i> Se connecter</>}
          </button>
          <p style={{ textAlign:"center", marginTop:16, color:"var(--text-muted)", fontSize:"0.88rem" }}>
            Mot de passe oublié ? Contactez le responsable de l'association.
          </p>
        </div>
        <p style={{ textAlign:"center", color:"var(--text-muted)", fontSize:"0.82rem", marginTop:20 }}>
          <em>Compte démo : admin@mini-ecole.fr / admin123</em>
        </p>
      </div>
    </div>
  );
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function parseDateFR(dd) {
  if (!dd) return null;
  let m = dd.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) m = dd.match(/^(\d{2})(\d{2})(\d{4})$/);
  if (!m) return null;
  return `${m[3]}-${m[2]}-${m[1]}`;
}
function formatDateFR(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR');
}
function formatDateInput(raw) {
  const digits = raw.replace(/\D/g, '').slice(0, 8);
  if (digits.length <= 2) return digits;
  if (digits.length <= 4) return digits.slice(0,2) + '/' + digits.slice(2);
  return digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4);
}

    setLoading(true);

        const mapped = (Array.isArray(data) ? data : []).map(e => ({
          id: e.id,
          nom: e.nom,
          prenom: e.prenom,
          ddn: formatDateFR(e.date_naissance),

          tel: e.contact_parent_telephone || '—',
          statut: e.statut,

        setEleves(mapped);

      .catch(() => setEleves(ELEVES))
      .finally(() => setLoading(false));
  }, []);

  const filtered = eleves.filter(e =>
    e.statut !== "archivé" &&
    (e.nom + " " + e.prenom + " " + e.groupe + " " + e.niveau).toLowerCase().includes(search.toLowerCase())

      date_naissance: parseDateFR(form.ddn) || null,

    if (modal === "add") {

      } catch (e) {
        setEleves(prev => [...prev, { id: Date.now(), statut:"actif", paiement:"À jour", groupe:"—", ...form, ddn: form.ddn || '—' }]);
      }
    } else if (modal === "edit") {
      try {
        const updated = await api(`/eleves/${form.id}`, { method: 'PUT', body: payload });
        setEleves(prev => prev.map(e => e.id === updated.id ? { ...e, nom: updated.nom, prenom: updated.prenom, ddn: formatDateFR(updated.date_naissance), niveau: updated.niveau_scolaire || '—', parent: updated.contact_parent_nom || '—', tel: updated.contact_parent_telephone || '—' } : e));
      } catch (e) {
        setEleves(prev => prev.map(e => e.id === form.id ? { ...e, ...form, ddn: form.ddn || '—' } : e));
      }
    }
    setModal(null); setForm({}); setErrors({});
  };

  const handleDelete = async (id) => {
    try {
      await api(`/eleves/${id}`, { method: 'DELETE' });
      setEleves(prev => prev.filter(e => e.id !== id));
    } catch (e) {
      alert(e.message || "Impossible d'archiver cet élève.");
    }
    setConfirmDelete(null);
  };

  if (fiche) return <FicheEleve eleve={fiche} onBack={()=>setFiche(null)} user={user} onUpdate={(updated)=>{ setEleves(prev=>prev.map(e=>e.id===updated.id?{...e,nom:updated.nom,prenom:updated.prenom,ddn:formatDateFR(updated.date_naissance),niveau:updated.niveau_scolaire||'—',parent:updated.contact_parent_nom||'—',tel:updated.contact_parent_telephone||'—'}:e)); }} onDelete={(id)=>{ setEleves(prev=>prev.filter(e=>e.id!==id)); }} />;

  return (
    <div>
      <PageHeader title={`Élèves inscrits (${filtered.length})`}
        action={

      <div style={{ ...appStyles.card, padding:0, overflowX:"auto" }}>

            <tr>

              <th style={appStyles.th}>Groupe</th>

              <th style={appStyles.th}>Paiement</th>
              <th style={appStyles.th}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(e => (
              <tr key={e.id}
                  onMouseEnter={ev=>ev.currentTarget.style.background="var(--beige)"}
                  onMouseLeave={ev=>ev.currentTarget.style.background="var(--white)"}>
                <td style={appStyles.td}>
                  <div style={{ fontWeight:700 }}>{e.prenom} {e.nom}</div>
                  <div style={{ color:"var(--text-muted)", fontSize:"0.85rem" }}>Né(e) le {e.ddn}</div>
                </td>
                <td style={appStyles.td}>{e.niveau}</td>
                <td style={appStyles.td}>{e.groupe}</td>
                <td style={appStyles.td}>
                  <div>{e.parent}</div>
                  <div style={{ color:"var(--text-muted)", fontSize:"0.85rem" }}>{e.tel}</div>
                </td>
                <td style={appStyles.td}>

                    <i className={`fa-solid fa-${e.paiement==="À jour"?"circle-check":"circle-exclamation"}`}></i>
                    {e.paiement}
                  </span>
                </td>
                <td style={appStyles.td}>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <button style={{ ...appStyles.btnSecondary, padding:"7px 14px", fontSize:"0.88rem" }} onClick={()=>setFiche(e)}>
                      <i className="fa-solid fa-eye"></i> Voir
                    </button>
                    {canEdit && (
                      <button style={{ ...appStyles.btnSecondary, padding:"7px 14px", fontSize:"0.88rem" }} onClick={()=>{ setForm({...e}); setErrors({}); setModal("edit"); }}>
                        <i className="fa-solid fa-pen"></i> Modifier

                    {canDelete && (
                      <button style={{ padding:"7px 14px", fontSize:"0.88rem", borderRadius:"var(--radius-sm)", border:"2px solid var(--red)", background:"var(--white)", color:"var(--red)", fontWeight:600, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:6 }} onClick={()=>setConfirmDelete(e)}>
                        <i className="fa-solid fa-trash"></i> Supprimer
                      </button>

            ))}
          </tbody>
        </table>
      </div>

      {modal && (
        <Modal title={modal==="add" ? "Ajouter un nouvel élève" : "Modifier la fiche élève"} onClose={()=>{ setModal(null); setForm({}); setErrors({}); }}>
          <FormField label="Nom de famille" required error={errors.nom}>
            <input style={{ ...appStyles.input, borderColor: errors.nom ? "var(--red)" : "var(--border)" }}
                   value={form.nom||""} onChange={e=>{ setForm(p=>({...p,nom:e.target.value})); setErrors(p=>({...p,nom:""})); }}
                   placeholder="ex : Koné" />
          </FormField>
          <FormField label="Prénom" required error={errors.prenom}>
            <input style={{ ...appStyles.input, borderColor: errors.prenom ? "var(--red)" : "var(--border)" }}
                   value={form.prenom||""} onChange={e=>{ setForm(p=>({...p,prenom:e.target.value})); setErrors(p=>({...p,prenom:""})); }}
                   placeholder="ex : Amara" />
          </FormField>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
            <FormField label="Date de naissance" error={errors.ddn}>
              <input style={{ ...appStyles.input, borderColor: errors.ddn ? "var(--red)" : "var(--border)" }} value={form.ddn||""} onChange={e=>{ const v = formatDateInput(e.target.value); setForm(p=>({...p,ddn:v})); setErrors(p=>({...p,ddn:""})); }} placeholder="JJ/MM/AAAA" />

function FicheEleve({ eleve: initialEleve, onBack, user, onUpdate, onDelete }) {
  const [loading, setLoading] = React.useState(true);
  const [eleve, setEleve] = React.useState(null);
  const [presences, setPresences] = React.useState([]);
  const [paiements, setPaiements] = React.useState([]);
  const [notes, setNotes] = React.useState([]);
  const [stats, setStats] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [errors, setErrors] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire');
  const canDelete = user && (user.role === 'admin' || user.role === 'secretaire');

  React.useEffect(() => {
    loadData();
  }, [initialEleve.id]);

  const loadData = async () => {
    setLoading(true);
    try {
      const [eleveData, statsData, presData, paieData, notesData] = await Promise.all([
        api(`/eleves/${initialEleve.id}`),
        api(`/eleves/${initialEleve.id}/stats`),
        api(`/presences?eleve_id=${initialEleve.id}`),
        api(`/paiements?eleve_id=${initialEleve.id}`),
        api(`/notes?eleve_id=${initialEleve.id}`)
      ]);
      setEleve(eleveData);
      setStats(statsData);
      setPresences(Array.isArray(presData) ? presData : []);
      setPaiements(Array.isArray(paieData) ? paieData : []);
      setNotes(Array.isArray(notesData) ? notesData : []);
    } catch (e) {
      setEleve({
        id: initialEleve.id, nom: initialEleve.nom, prenom: initialEleve.prenom,
        date_naissance: initialEleve.ddn, niveau_scolaire: initialEleve.niveau,
        contact_parent_nom: initialEleve.parent, contact_parent_telephone: initialEleve.tel,
        statut: initialEleve.statut
      });
      setPresences([]); setPaiements([]); setNotes([]);
    } finally {
      setLoading(false);
    }
  };

  const startEdit = () => {
    setForm({
      nom: eleve.nom, prenom: eleve.prenom,
      ddn: formatDateFR(eleve.date_naissance),
      niveau: eleve.niveau_scolaire || '',
      parent: eleve.contact_parent_nom || '',
      tel: eleve.contact_parent_telephone || ''
    });
    setErrors({});
    setEditMode(true);
  };

  const validate = () => {
    const err = {};
    if (!form.nom?.trim()) err.nom = "Ce champ est obligatoire.";
    if (!form.prenom?.trim()) err.prenom = "Ce champ est obligatoire.";
    if (!form.niveau) err.niveau = "Choisissez un niveau scolaire.";
    if (form.ddn && !parseDateFR(form.ddn)) err.ddn = "Format attendu : JJ/MM/AAAA.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      const updated = await api(`/eleves/${eleve.id}`, { method: 'PUT', body: {
        nom: form.nom, prenom: form.prenom,
        date_naissance: parseDateFR(form.ddn) || null,
        niveau_scolaire: form.niveau,
        contact_parent_nom: form.parent,
        contact_parent_telephone: form.tel || null
      }});
      setEleve(updated);
      setEditMode(false);
      setSaved(true);
      setTimeout(()=>setSaved(false), 3000);
      if (onUpdate) onUpdate(updated);
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
  };

  const handleDelete = async () => {
    try {
      await api(`/eleves/${eleve.id}`, { method: 'DELETE' });
      if (onDelete) onDelete(eleve.id);
      onBack();
    } catch (e) {
      alert(e.message || "Impossible d'archiver cet élève.");
    }
    setConfirmDelete(false);
  };

  if (loading) {
    return (
      <div style={{ textAlign:'center', padding:40 }}>
        <i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i>
        <p style={{ marginTop:12, color:'var(--text-muted)' }}>Chargement de la fiche…</p>
      </div>
    );

  const statutPresences = {};
  (stats?.presences || []).forEach(p => { statutPresences[p.statut] = p.count; });
  const totalPresences = Object.values(statutPresences).reduce((a,b)=>a+b,0);
  const tauxPresence = totalPresences > 0 ? Math.round(((statutPresences.present||0)+(statutPresences.retard||0))/totalPresences*100) : 0;
  const totalPaiements = stats?.paiements?.total || 0;

  const statutLabel = (s) => ({ present:'Présent', absent:'Absent', retard:'En retard', absent_justifie:'Absent justifié' }[s] || s);
  const statutColor = (s) => s==='present'?'green':(s==='absent_justifie'?'orange':(s==='retard'?'orange':'red'));

          <button style={{ ...appStyles.btnSecondary, borderColor:'var(--red)', color:'var(--red)' }} onClick={()=>setConfirmDelete(true)}>
            <i className="fa-solid fa-trash"></i> Archiver

        <div style={{ display:'flex', alignItems:'flex-start', gap:20, flexWrap:'wrap' }}>
          <div style={{ width:72, height:72, borderRadius:'50%', background:'var(--navy)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', flexShrink:0, fontFamily:'Lora, serif', fontSize:'1.6rem', fontWeight:700 }}>
            {eleve.prenom?.[0]}{eleve.nom?.[0]}
          </div>
          <div style={{ flex:1 }}>
            <h2 style={{ fontFamily:'Lora, serif', fontSize:'1.6rem', color:'var(--navy)' }}>{eleve.prenom} {eleve.nom}</h2>
            <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginTop:8 }}>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-book-open"></i> {eleve.niveau_scolaire || '—'}</span>
              <span style={appStyles.badge(totalPaiements>0?'green':'red')}>
                <i className={`fa-solid fa-${totalPaiements>0?'circle-check':'circle-exclamation'}`}></i>
                {totalPaiements>0?`Cotisation à jour (${totalPaiements} €)`:'Cotisation en attente'}
              </span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-chart-pie"></i> Présence {tauxPresence}%</span>
            </div>
          </div>
        </div>
      </div>

      {editMode ? (
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Modifier les informations</h3>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Nom" required error={errors.nom}>
              <input style={{ ...appStyles.input, borderColor: errors.nom?'var(--red)':'var(--border)' }} value={form.nom||''} onChange={e=>{ setForm(p=>({...p,nom:e.target.value})); setErrors(p=>({...p,nom:''})); }} />
            </FormField>
            <FormField label="Prénom" required error={errors.prenom}>
              <input style={{ ...appStyles.input, borderColor: errors.prenom?'var(--red)':'var(--border)' }} value={form.prenom||''} onChange={e=>{ setForm(p=>({...p,prenom:e.target.value})); setErrors(p=>({...p,prenom:''})); }} />
            </FormField>

                <option value="">— Choisir —</option>

            </FormField>
            <FormField label="Téléphone">
              <input style={appStyles.input} type="tel" value={form.tel||''} onChange={e=>setForm(p=>({...p,tel:e.target.value}))} />
            </FormField>
          </div>
          <div style={{ display:'flex', gap:12, marginTop:20, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setEditMode(false); setErrors({}); }}>Annuler</button>
            <button style={appStyles.btnPrimary} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </div>
      ) : (
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Informations personnelles</h3>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:12 }}>
            {[ ["Date de naissance", formatDateFR(eleve.date_naissance)||'—', "cake-candles"], ["Niveau", eleve.niveau_scolaire||'—', "book-open"], ["Parent / Tuteur", eleve.contact_parent_nom||'—', "person"], ["Téléphone", eleve.contact_parent_telephone||'—', "phone"] ].map(([k,v,ico])=>(
              <div key={k} style={{ display:'flex', flexDirection:'column', gap:4, padding:'10px 14px', background:'var(--beige)', borderRadius:'var(--radius-sm)' }}>
                <span style={{ color:'var(--text-muted)', fontSize:'0.85rem', display:'flex', alignItems:'center', gap:6 }}>
                  <i className={`fa-solid fa-${ico}`} style={{ width:14 }}></i>{k}
                </span>
                <span style={{ fontWeight:600, fontSize:'1rem' }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))', gap:16, marginTop:16 }}>
        {/* PRÉSENCES */}
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Dernières présences</h3>
          {presences.length === 0 ? (
            <AlertBox type="info">Aucune présence enregistrée pour cet élève.</AlertBox>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {presences.slice(0,5).map(p => (
                <div key={p.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{p.matiere || 'Cours'}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{formatDateFR(p.date_seance)}</div>
                  </div>
                  <span style={appStyles.badge(statutColor(p.statut))}>
                    <i className={`fa-solid fa-${p.statut==='present'?'circle-check':(p.statut==='retard'?'clock':(p.statut==='absent_justifie'?'file-circle-check':'circle-xmark'))}`}></i>
                    {statutLabel(p.statut)}
                  </span>
                </div>
              ))}
              {presences.length > 5 && (
                <div style={{ textAlign:'center', color:'var(--text-muted)', fontSize:'0.88rem', marginTop:4 }}>
                  + {presences.length - 5} séance(s) supplémentaire(s)
                </div>
              )}
            </div>
          )}
        </div>

        {/* PAIMENTS */}
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Paiements</h3>
          {paiements.length === 0 ? (
            <AlertBox type="info">Aucun paiement enregistré.</AlertBox>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {paiements.slice(0,5).map(p => (
                <div key={p.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{p.formule || 'Paiement'}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{formatDateFR(p.date_paiement)} · {p.mode_paiement || '—'}</div>
                  </div>
                  <span style={{ fontWeight:700, fontSize:'1.05rem', color:'var(--green)' }}>{p.montant} €</span>
                </div>
              ))}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:6, borderTop:'2px solid var(--border)', marginTop:4 }}>
                <span style={{ fontWeight:600 }}>Total payé</span>
                <span style={{ fontWeight:700, fontSize:'1.1rem', color:'var(--navy)' }}>{totalPaiements} €</span>
              </div>
            </div>
          )}
        </div>

        {/* NOTES */}
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Dernières notes</h3>
          {notes.length === 0 ? (
            <AlertBox type="info">Aucune note enregistrée.</AlertBox>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {notes.slice(0,5).map(n => (
                <div key={n.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{n.matiere || '—'}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{formatDateFR(n.date_evaluation)}</div>
                    {n.appreciation && <div style={{ color:'var(--text-muted)', fontSize:'0.85rem', fontStyle:'italic', marginTop:2 }}>"{n.appreciation}"</div>}
                  </div>
                  <span style={{ background:'var(--navy)', color:'#fff', borderRadius:'var(--radius-sm)', padding:'4px 12px', fontWeight:700, fontSize:'1.05rem', flexShrink:0 }}>{n.valeur ?? '—'}/20</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {confirmDelete && (
        <Modal title="Confirmer l'archivage" onClose={()=>setConfirmDelete(false)}>
          <AlertBox type="warning">
            Voulez-vous vraiment archiver la fiche de <strong>{eleve.prenom} {eleve.nom}</strong> ?<br />
            Cette action est réversible depuis la base de données.
          </AlertBox>
          <div style={{ display:'flex', gap:12, marginTop:8, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>setConfirmDelete(false)}>Annuler</button>
            <button style={{ ...appStyles.btnPrimary, background:'var(--red)' }} onClick={handleDelete}>
              <i className="fa-solid fa-trash"></i> Confirmer
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── PRÉSENCES ─────────────────────────────────────────────────────────────
function PresencesScreen({ user }) {
  const [tab, setTab] = React.useState('saisie');
  const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
  const [coursList, setCoursList] = React.useState([]);
  const [coursSearch, setCoursSearch] = React.useState('');
  const [selectedCours, setSelectedCours] = React.useState(null);
  const [eleves, setEleves] = React.useState([]);
  const [elevesParGroupe, setElevesParGroupe] = React.useState([]);
  const [groupesCours, setGroupesCours] = React.useState([]);
  const [groupeActif, setGroupeActif] = React.useState('tous');
  const [presences, setPresences] = React.useState({});
  const [comments, setComments] = React.useState({});
  const [loading, setLoading] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [historique, setHistorique] = React.useState([]);
  const [histFilters, setHistFilters] = React.useState({ eleve_id: '', cours_id: '', date_debut: '', date_fin: '' });
  const [alertes, setAlertes] = React.useState([]);
  const [seuilAlertes, setSeuilAlertes] = React.useState(3);
  const jours = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire' || user.role === 'enseignant');

  const statutConfig = {
    present:         { label:"Présent",         icon:"circle-check",       color:"green" },
    absent:          { label:"Absent",           icon:"circle-xmark",       color:"red" },
    retard:          { label:"En retard",        icon:"clock",              color:"orange" },
    absent_justifie: { label:"Absent justifié",  icon:"file-circle-check",  color:"text-muted" },
  };

  React.useEffect(() => { loadCours(); }, []);
  React.useEffect(() => { if (tab === 'alertes') loadAlertes(); }, [tab, seuilAlertes]);
  React.useEffect(() => { if (tab === 'historique') loadHistorique(); }, [tab]);

  const loadCours = async () => {
    try {
      const data = await api('/cours');
      const all = Array.isArray(data) ? data : [];
      const filtered = user?.role === 'enseignant'
        ? all.filter(c => c.enseignant_id === user.id)
        : all;
      setCoursList(filtered);
    } catch (e) { setCoursList([]); }
  };

  const loadElevesForCours = async (cours) => {
    setLoading(true);
    try {
      const detail = await api(`/cours/${cours.id}`);
      const grpList = detail?.groupes || [];
      setGroupesCours(grpList);
      const indivEleves = detail?.eleves || [];
      // Construire la map élève -> groupes
      const eleveGroupes = {};
      grpList.forEach(g => {
        (g.eleves || []).forEach(e => {
          if (!eleveGroupes[e.id]) eleveGroupes[e.id] = [];
          eleveGroupes[e.id].push(g);
        });
      });
      const grpEleves = grpList.flatMap(g => g.eleves || []);
      const all = [...grpEleves, ...indivEleves];
      const uniqueMap = new Map();
      all.forEach(e => {
        if (!uniqueMap.has(e.id)) uniqueMap.set(e.id, { ...e, groupes: eleveGroupes[e.id] || [] });
      });
      const unique = Array.from(uniqueMap.values());
      setEleves(unique);
      setElevesParGroupe(unique);
      // Charger présences existantes
      const existing = await api(`/presences?cours_id=${cours.id}&date_seance=${date}`);
      const map = {};
      const comm = {};
      (Array.isArray(existing) ? existing : []).forEach(p => {
        map[p.eleve_id] = p.statut;
        if (p.commentaire) comm[p.eleve_id] = p.commentaire;
      });
      setPresences(map);
      setComments(comm);
    } catch (e) {
      setEleves([]); setElevesParGroupe([]); setGroupesCours([]); setPresences({}); setComments({});
    } finally { setLoading(false); }
  };

  const handleSelectCours = (c) => {
    setSelectedCours(c);
    setCoursSearch('');
    setGroupeActif('tous');
    setSaved(false);
    if (c) loadElevesForCours(c);
    else { setEleves([]); setElevesParGroupe([]); setGroupesCours([]); setPresences({}); setComments({}); }
  };

  const filteredCours = coursList.filter(c => {
    const txt = (c.matiere + ' ' + c.titre + ' ' + jours[c.jour_semaine||0] + ' ' + (c.salle||'') + ' ' + (c.enseignant_prenom||'') + ' ' + (c.enseignant_nom||'')).toLowerCase();
    return txt.includes(coursSearch.toLowerCase());
  });

  const setStatut = (eleveId, statut) => {
    setPresences(p => ({ ...p, [eleveId]: statut }));
    setSaved(false);
  };

  const setComment = (eleveId, val) => {
    setComments(c => ({ ...c, [eleveId]: val }));
    setSaved(false);
  };

  const handleSave = async () => {
    if (!selectedCours || eleves.length === 0) return;
    setLoading(true);
    try {
      const payload = eleves.map(e => ({
        cours_id: selectedCours.id,
        eleve_id: e.id,
        date_seance: date,
        statut: presences[e.id] || 'absent',
        commentaire: comments[e.id] || null,
        saisi_par: user?.id || null
      }));
      await api('/presences/bulk', { method: 'POST', body: { presences: payload } });
      setSaved(true);
      setTimeout(()=>setSaved(false), 4000);
    } catch (e) {
      alert(e.message || "Erreur lors de l'enregistrement.");
    } finally { setLoading(false); }
  };

  const loadHistorique = async () => {
    setLoading(true);
    try {
      let url = '/presences?eleve_id=1';
      if (histFilters.eleve_id) url = `/presences?eleve_id=${histFilters.eleve_id}`;
      else if (histFilters.cours_id) url = `/presences?cours_id=${histFilters.cours_id}&date_seance=${histFilters.date_debut||date}`;
      else url = `/presences?eleve_id=1`;
      const data = await api(url);
      setHistorique(Array.isArray(data) ? data : []);
    } catch (e) { setHistorique([]); }
    finally { setLoading(false); }
  };

  const loadAlertes = async () => {
    try {
      const data = await api(`/presences/alertes?seuil=${seuilAlertes}`);
      setAlertes(Array.isArray(data) ? data : []);
    } catch (e) { setAlertes([]); }
  };

  const formatHeure = (h) => h ? h.slice(0,5) : '—';
  const jourLabel = (js) => js !== undefined && js !== null ? jours[js] : '—';
  const statutBadge = (s) => statutConfig[s] || { label: s, icon: 'circle', color: 'beige' };

  const nbPresent = eleves.filter(e => presences[e.id] === 'present').length;
  const nbAbsent = eleves.filter(e => ['absent','absent_justifie'].includes(presences[e.id])).length;
  const nbRetard = eleves.filter(e => presences[e.id] === 'retard').length;

  const elevesFiltres = groupeActif === 'tous'
    ? eleves
    : eleves.filter(e => e.groupes?.some(g => String(g.id) === String(groupeActif)));

  return (
    <div>
      <PageHeader title="Présences" />

      <div style={{ display:'flex', background:'var(--beige-dark)', borderRadius:'var(--radius-sm)', padding:3, marginBottom:24 }}>
        {[{k:'saisie',l:'Saisie du jour',i:'clipboard-check'},{k:'historique',l:'Historique',i:'clock-rotate-left'},{k:'alertes',l:'Alertes',i:'triangle-exclamation'}].map(t => (
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{ flex:1, padding:'10px 16px', borderRadius:'var(--radius-sm)', border:'none', fontWeight:600, fontSize:'0.95rem', cursor:'pointer', background: tab===t.k?'var(--white)':'transparent', color: tab===t.k?'var(--navy)':'var(--text-muted)', boxShadow: tab===t.k?'var(--shadow)':'none', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            <i className={`fa-solid fa-${t.i}`}></i> {t.l}
          </button>
        ))}
      </div>

      {/* ─── SAISIE DU JOUR ─── */}
      {tab === 'saisie' && (
        <div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))', gap:14, marginBottom:20 }}>
            <FormField label="Date de la séance">
              <input type="date" style={appStyles.input} value={date} onChange={e=>{ setDate(e.target.value); setSaved(false); if (selectedCours) loadElevesForCours(selectedCours); }} />
            </FormField>
            <FormField label="Cours">
              <div style={{ position:'relative' }}>
                <i className="fa-solid fa-magnifying-glass" style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', pointerEvents:'none' }}></i>
                <input style={{ ...appStyles.input, paddingLeft:42 }} value={selectedCours ? `${selectedCours.matiere} · ${jourLabel(selectedCours.jour_semaine)} ${formatHeure(selectedCours.heure_debut)}` : coursSearch} onChange={e=>{ setCoursSearch(e.target.value); setSelectedCours(null); }} placeholder="Rechercher un cours…" />
                {!selectedCours && coursSearch && (
                  <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, maxHeight:220, overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'var(--white)', zIndex:50, boxShadow:'var(--shadow-lg)' }}>
                    {filteredCours.length === 0 ? (
                      <div style={{ padding:'12px 16px', color:'var(--text-muted)', fontSize:'0.9rem' }}>Aucun cours trouvé.</div>
                    ) : (
                      filteredCours.map(c => (
                        <button key={c.id} onClick={()=>handleSelectCours(c)}
                          style={{ display:'block', width:'100%', textAlign:'left', padding:'12px 16px', border:'none', borderBottom:'1px solid var(--border)', background:'transparent', cursor:'pointer' }}
                          onMouseEnter={ev=>ev.currentTarget.style.background='var(--beige)'}
                          onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                          <div style={{ fontWeight:600, fontSize:'0.97rem' }}>{c.matiere} {c.titre ? `— ${c.titre}` : ''}</div>
                          <div style={{ color:'var(--text-muted)', fontSize:'0.85rem', marginTop:2 }}>{jourLabel(c.jour_semaine)} {formatHeure(c.heure_debut)} – {formatHeure(c.heure_fin)} · {c.salle || '—'} · {c.enseignant_prenom || ''} {c.enseignant_nom || ''}</div>
                        </button>
                      ))
                    )}
                  </div>
                )}
              </div>
            </FormField>
          </div>

          {saved && <AlertBox type="success"><i className="fa-solid fa-circle-check"></i> Présences enregistrées avec succès.</AlertBox>}

          {selectedCours && (
            <div style={{ ...appStyles.card, background:'var(--navy)', color:'#fff', marginBottom:20 }}>
              <h2 style={{ fontFamily:'Lora, serif', fontSize:'1.3rem', marginBottom:4 }}>{selectedCours.matiere}</h2>
              <p style={{ opacity:0.8, fontSize:'0.95rem' }}>{jourLabel(selectedCours.jour_semaine)} {formatHeure(selectedCours.heure_debut)} – {formatHeure(selectedCours.heure_fin)} · {selectedCours.salle || '—'}</p>
            </div>
          )}

          {loading ? (
            <div style={{ textAlign:'center', padding:40 }}>
              <i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i>
            </div>
          ) : selectedCours && eleves.length === 0 ? (
            <AlertBox type="info">Ce cours n'a aucun groupe avec des élèves actifs, ni d'élève assigné individuellement.</AlertBox>
          ) : selectedCours ? (
            <>
              <div style={{ display:'flex', gap:12, flexWrap:'wrap', marginBottom:16 }}>
                <span style={appStyles.badge('green')}><i className="fa-solid fa-circle-check"></i> {nbPresent} présent{nbPresent>1?'s':''}</span>
                <span style={appStyles.badge('red')}><i className="fa-solid fa-circle-xmark"></i> {nbAbsent} absent{nbAbsent>1?'s':''}</span>
                <span style={appStyles.badge('orange')}><i className="fa-solid fa-clock"></i> {nbRetard} retard{nbRetard>1?'s':''}</span>
                <span style={appStyles.badge('beige')}><i className="fa-solid fa-users"></i> {eleves.length} au total</span>
              </div>

              {/* Filtres par groupe */}
              {groupesCours.length > 0 && (
                <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:20, alignItems:'center' }}>
                  <span style={{ fontWeight:600, fontSize:'0.9rem', color:'var(--text-muted)' }}><i className="fa-solid fa-filter"></i> Filtrer par groupe :</span>
                  <button onClick={()=>setGroupeActif('tous')}
                    style={{ padding:'6px 14px', borderRadius:20, border:'2px solid', fontSize:'0.88rem', fontWeight:600, cursor:'pointer',
                      background: groupeActif==='tous'?'var(--navy)':'var(--white)', color: groupeActif==='tous'?'#fff':'var(--navy)', borderColor: groupeActif==='tous'?'var(--navy)':'var(--border)' }}>
                    Tous
                  </button>
                  {groupesCours.map(g => (
                    <button key={g.id} onClick={()=>setGroupeActif(String(g.id))}
                      style={{ padding:'6px 14px', borderRadius:20, border:'2px solid', fontSize:'0.88rem', fontWeight:600, cursor:'pointer',
                        background: groupeActif===String(g.id)?'var(--navy)':'var(--white)', color: groupeActif===String(g.id)?'#fff':'var(--navy)', borderColor: groupeActif===String(g.id)?'var(--navy)':'var(--border)' }}>
                      {g.nom}
                    </button>
                  ))}
                  {groupesCours.length > 0 && eleves.some(e => !e.groupes?.length) && (
                    <button onClick={()=>setGroupeActif('individuel')}
                      style={{ padding:'6px 14px', borderRadius:20, border:'2px solid', fontSize:'0.88rem', fontWeight:600, cursor:'pointer',
                        background: groupeActif==='individuel'?'var(--navy)':'var(--white)', color: groupeActif==='individuel'?'#fff':'var(--navy)', borderColor: groupeActif==='individuel'?'var(--navy)':'var(--border)' }}>
                      Individuels
                    </button>
                  )}
                </div>
              )}

              <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:24 }}>
                {elevesFiltres.map(e => (
                  <div key={e.id} style={{ ...appStyles.card, padding:'16px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:14 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:12, minWidth:200 }}>
                      <div style={{ width:40, height:40, borderRadius:'50%', background:'var(--navy)', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:'0.9rem' }}>
                        {e.prenom?.[0]}{e.nom?.[0]}
                      </div>
                      <div>
                        <div style={{ fontWeight:700, fontSize:'1.05rem' }}>{e.prenom} {e.nom}</div>
                        <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>
                          {e.niveau_scolaire || '—'}
                          {e.groupes?.length > 0 && <span> · {e.groupes.map(g=>g.nom).join(', ')}</span>}
                        </div>
                      </div>
                    </div>
                    <div style={{ display:'flex', gap:8, flexWrap:'wrap', flex:1, justifyContent:'flex-end' }}>
                      {Object.entries(statutConfig).map(([s, cfg]) => {
                        const isActive = presences[e.id] === s;
                        const activeColors = { green:{bg:'var(--green)',color:'#fff'}, red:{bg:'var(--red)',color:'#fff'}, orange:{bg:'var(--orange)',color:'#fff'}, 'text-muted':{bg:'var(--text-muted)',color:'#fff'} };
                        return (
                          <button key={s}
                            style={{
                              padding:'9px 14px', fontSize:'0.88rem', fontWeight:600,
                              borderRadius:'var(--radius-sm)', cursor:'pointer', border:'2px solid',
                              display:'inline-flex', alignItems:'center', gap:6,
                              ...(isActive
                                ? { ...activeColors[cfg.color], borderColor:'transparent' }
                                : { background:'var(--white)', color:'var(--text-muted)', borderColor:'var(--border)' })
                            }}
                            onClick={()=>setStatut(e.id, s)}>
                            <i className={`fa-solid fa-${cfg.icon}`}></i> {cfg.label}
                          </button>
                        );
                      })}
                    </div>
                    <input style={{ ...appStyles.input, maxWidth:220, fontSize:'0.9rem' }} value={comments[e.id]||''} onChange={ev=>setComment(e.id, ev.target.value)} placeholder="Commentaire (facultatif)" />
                  </div>
                ))}
              </div>
              {canEdit && (
                <div style={{ display:'flex', gap:12, justifyContent:'flex-end' }}>
                  <button style={appStyles.btnSuccess} onClick={handleSave} disabled={loading}>
                    <i className="fa-solid fa-floppy-disk"></i> {loading ? 'Enregistrement…' : 'Enregistrer les présences'}
                  </button>
                </div>
              )}
            </>
          ) : (
            <AlertBox type="info">Sélectionnez un cours pour commencer la saisie.</AlertBox>
          )}
        </div>
      )}

      {/* ─── HISTORIQUE ─── */}
      {tab === 'historique' && (
        <div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:14, marginBottom:20 }}>

            <FormField label="Date début">

                        <td style={appStyles.td}>{h.commentaire || '—'}</td>

              </table>
            </div>
          )}
        </div>
      )}

      {/* ─── ALERTES ─── */}
      {tab === 'alertes' && (
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:20, flexWrap:'wrap' }}>
            <FormField label="Seuil d'alerte (absences sur 30j)" inline>

                <input type="number" min={1} max={20} style={{ ...appStyles.input, width:80, textAlign:'center' }} value={seuilAlertes} onChange={e=>setSeuilAlertes(+e.target.value)} />
                <button style={{ ...appStyles.btnPrimary, padding:'10px 16px' }} onClick={loadAlertes}><i className="fa-solid fa-rotate"></i> Actualiser</button>
              </div>
            </FormField>
          </div>
          {alertes.length === 0 ? (
            <AlertBox type="success">Aucune alerte d'absence au-delà du seuil de {seuilAlertes} absence(s).</AlertBox>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {alertes.map(a => (
                <div key={a.eleve_id} style={{ ...appStyles.card, borderLeft:'4px solid var(--red)', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ width:44, height:44, borderRadius:'50%', background:'var(--red-light)', color:'var(--red)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:'1rem' }}>
                      <i className="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <div>
                      <div style={{ fontWeight:700, fontSize:'1.05rem' }}>{a.prenom} {a.nom}</div>
                      <div style={{ color:'var(--text-muted)', fontSize:'0.9rem' }}>{a.nb_absences} absences sur les 30 derniers jours</div>
                    </div>
                  </div>
                  <span style={appStyles.badge('red')}><i className="fa-solid fa-circle-xmark"></i> {a.nb_absences} absences</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── FINANCES ──────────────────────────────────────────────────────────────
function FinancesScreen({ user }) {
  const [paiements, setPaiements] = React.useState([]);
  const [stats, setStats] = React.useState(null);
  const [impayes, setImpayes] = React.useState([]);
  const [eleves, setEleves] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({});
  const [errors, setErrors] = React.useState({});
  const [saved, setSaved] = React.useState(false);
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const [eleveSearch, setEleveSearch] = React.useState('');
  const [selectedEleve, setSelectedEleve] = React.useState(null);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire');

  React.useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    try {
      const [pData, sData, iData, eData] = await Promise.all([
        api('/paiements'),
        api('/paiements/stats'),
        api('/paiements/impayes'),
        api('/eleves?statut=actif')
      ]);
      setPaiements(Array.isArray(pData) ? pData : []);
      setStats(sData);
      setImpayes(Array.isArray(iData) ? iData : []);
      setEleves(Array.isArray(eData) ? eData : []);
    } catch (e) {
      setPaiements([]); setStats(null); setImpayes([]); setEleves([]);
    } finally { setLoading(false); }
  };

  const validate = () => {
    const err = {};
    if (!form.eleve_id) err.eleve_id = "Sélectionnez un élève.";
    if (!form.montant || form.montant <= 0) err.montant = "Saisissez un montant valide.";
    if (!form.date_paiement) err.date_paiement = "Saisissez la date du paiement.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      const payload = {
        eleve_id: +form.eleve_id,
        montant: +form.montant,
        date_paiement: form.date_paiement,
        mode_paiement: form.mode_paiement || null,
        formule: form.formule || null,
        periode_debut: form.periode_debut || null,
        periode_fin: form.periode_fin || null,
        notes: form.notes || null,
        saisi_par: user?.id || null
      };
      if (modal === 'add') {
        const created = await api('/paiements', { method: 'POST', body: payload });
        setPaiements(prev => [created, ...prev]);
      } else {
        const updated = await api(`/paiements/${form.id}`, { method: 'PUT', body: payload });
        setPaiements(prev => prev.map(p => p.id === updated.id ? updated : p));
      }
      setSaved(true); setTimeout(()=>setSaved(false), 4000);
      // Recharger stats & impayés
      const [sData, iData] = await Promise.all([api('/paiements/stats'), api('/paiements/impayes')]);
      setStats(sData); setImpayes(Array.isArray(iData)?iData:[]);
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
    setModal(null); setForm({}); setErrors({}); setEleveSearch(''); setSelectedEleve(null);
  };

  const handleDelete = async (id) => {
    try {
      await api(`/paiements/${id}`, { method: 'DELETE' });
      setPaiements(prev => prev.filter(p => p.id !== id));
      const [sData, iData] = await Promise.all([api('/paiements/stats'), api('/paiements/impayes')]);
      setStats(sData); setImpayes(Array.isArray(iData)?iData:[]);
    } catch (e) {
      alert(e.message || "Impossible de supprimer ce paiement.");
    }
    setConfirmDelete(null);
  };

  const openAdd = () => {
    setForm({ montant: 60, mode_paiement: 'especes', formule: 'mensuel', date_paiement: new Date().toISOString().split('T')[0], periode_debut: '', periode_fin: '' });
    setErrors({}); setModal('add');
  };

  const openEdit = (p) => {
    setForm({
      id: p.id, eleve_id: p.eleve_id, montant: p.montant,
      date_paiement: p.date_paiement,
      mode_paiement: p.mode_paiement || 'especes',
      formule: p.formule || 'mensuel',
      periode_debut: p.periode_debut || '',
      periode_fin: p.periode_fin || '',
      notes: p.notes || ''
    });
    const el = eleves.find(e => e.id === p.eleve_id);
    if (el) { setSelectedEleve(el); setEleveSearch(`${el.prenom} ${el.nom}`); }
    setErrors({}); setModal('edit');
  };

  const openPayImpaye = (el) => {
    setForm({ eleve_id: el.id, montant: 60, mode_paiement: 'especes', formule: 'mensuel', date_paiement: new Date().toISOString().split('T')[0], periode_debut: '', periode_fin: '' });
    setSelectedEleve(el); setEleveSearch(`${el.prenom} ${el.nom}`);
    setErrors({}); setModal('add');
  };

  const filteredEleves = eleves.filter(e => {
    const txt = (e.nom + ' ' + e.prenom).toLowerCase();
    return txt.includes(eleveSearch.toLowerCase());
  });

  const totalMois = stats?.reduce((s, x) => s + (x.total_recettes || 0), 0) || 0;

  return (
    <div>
      <PageHeader title="Paiements et cotisations"
        action={canEdit && <button style={appStyles.btnPrimary} onClick={openAdd}><i className="fa-solid fa-plus"></i> Enregistrer un paiement</button>} />

      {saved && <AlertBox type="success">Paiement enregistré avec succès.</AlertBox>}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:14, marginBottom:24 }}>
        <StatCard icon="circle-check" label="Total encaissé (mois)" value={`${totalMois.toFixed(2)} €`} color="green" />
        <StatCard icon="triangle-exclamation" label="Familles en retard" value={impayes.length} color="orange" />
        <StatCard icon="euro-sign" label="Nombre de paiements" value={paiements.length} color="beige" />
      </div>

      {impayes.length > 0 && (
        <div style={{ marginBottom:24 }}>
          <h3 style={{ fontFamily:'Lora, serif', fontSize:'1.1rem', color:'var(--red)', marginBottom:12, display:'flex', alignItems:'center', gap:8 }}>
            <i className="fa-solid fa-triangle-exclamation"></i> Paiements en retard
          </h3>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {impayes.map(el => (
              <div key={el.id} style={{ ...appStyles.card, padding:'16px 20px', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, border:'2px solid var(--red-light)' }}>
                <div>
                  <div style={{ fontWeight:700, fontSize:'1rem' }}>{el.prenom} {el.nom}</div>
                  <div style={{ color:'var(--text-muted)', fontSize:'0.88rem' }}>
                    Dernier paiement : {el.dernier_paiement ? formatDateFR(el.dernier_paiement) : 'Jamais'} · Total payé : {el.total_paye || 0} €
                  </div>
                </div>
                {canEdit && (
                  <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
                    <button style={appStyles.btnSecondary}><i className="fa-solid fa-envelope"></i> Relancer</button>
                    <button style={appStyles.btnSuccess} onClick={()=>openPayImpaye(el)}><i className="fa-solid fa-euro-sign"></i> Enregistrer paiement</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      <h3 style={{ fontFamily:'Lora, serif', fontSize:'1.1rem', color:'var(--navy)', marginBottom:12 }}>Tous les paiements</h3>
      {loading ? (
        <div style={{ textAlign:'center', padding:40 }}><i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i></div>
      ) : paiements.length === 0 ? (
        <AlertBox type="info">Aucun paiement enregistré.</AlertBox>
      ) : (
        <div style={{ ...appStyles.card, padding:0, overflowX:'auto' }}>
          <table style={appStyles.table}>
            <thead>
              <tr>
                <th style={appStyles.th}>Élève</th>
                <th style={appStyles.th}>Formule</th>
                <th style={appStyles.th}>Montant</th>
                <th style={appStyles.th}>Date</th>
                <th style={appStyles.th}>Mode</th>
                <th style={appStyles.th}>Reçu</th>
                <th style={appStyles.th}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {paiements.map(p => (
                <tr key={p.id}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--beige)'}
                    onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                  <td style={appStyles.td}><strong>{p.eleve_prenom} {p.eleve_nom}</strong></td>
                  <td style={appStyles.td}>{p.formule || '—'}</td>
                  <td style={appStyles.td}>{p.montant} €</td>
                  <td style={appStyles.td}>{formatDateFR(p.date_paiement)}</td>
                  <td style={appStyles.td}>{p.mode_paiement || '—'}</td>
                  <td style={appStyles.td}>
                    {p.recu_genere ? (
                      <span style={appStyles.badge('green')}><i className="fa-solid fa-file-invoice"></i> {p.recu_numero || 'Généré'}</span>
                    ) : (
                      <span style={appStyles.badge('beige')}>—</span>
                    )}
                  </td>
                  <td style={appStyles.td}>
                    <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                      <button style={{ ...appStyles.btnSecondary, padding:'7px 12px', fontSize:'0.85rem' }} onClick={async ()=>{
                        try {
                          const token = localStorage.getItem('admisco_token');
                          const res = await fetch(`/api/paiements/${p.id}/recu`, { headers: { 'Authorization': `Bearer ${token}` } });
                          if (!res.ok) throw new Error('Erreur');
                          const blob = await res.blob();
                          const url = URL.createObjectURL(blob);
                          window.open(url, '_blank');
                        } catch (e) { alert('Impossible de générer le reçu.'); }
                      }}>
                        <i className="fa-solid fa-file-pdf"></i> Reçu
                      </button>
                      {canEdit && (
                        <>
                          <button style={{ ...appStyles.btnSecondary, padding:'7px 12px', fontSize:'0.85rem' }} onClick={()=>openEdit(p)}><i className="fa-solid fa-pen"></i></button>
                          <button style={{ padding:'7px 12px', fontSize:'0.85rem', borderRadius:'var(--radius-sm)', border:'2px solid var(--red)', background:'var(--white)', color:'var(--red)', fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6 }} onClick={()=>setConfirmDelete(p)}>
                            <i className="fa-solid fa-trash"></i>
                          </button>
                        </>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {modal && (
        <Modal title={modal==='add' ? 'Enregistrer un paiement' : 'Modifier le paiement'} onClose={()=>{ setModal(null); setForm({}); setErrors({}); setEleveSearch(''); setSelectedEleve(null); }}>
          {modal==='add' && (
            <FormField label="Élève" required error={errors.eleve_id}>
              <div style={{ position:'relative' }}>
                <i className="fa-solid fa-magnifying-glass" style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', pointerEvents:'none' }}></i>
                <input style={{ ...appStyles.input, paddingLeft:42, borderColor: errors.eleve_id ? 'var(--red)' : 'var(--border)' }} value={selectedEleve ? `${selectedEleve.prenom} ${selectedEleve.nom}` : eleveSearch} onChange={e=>{ setEleveSearch(e.target.value); setSelectedEleve(null); setErrors(p=>({...p,eleve_id:''})); }} placeholder="Rechercher un élève…" />
                {!selectedEleve && eleveSearch && (
                  <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, maxHeight:220, overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'var(--white)', zIndex:50, boxShadow:'var(--shadow-lg)' }}>
                    {filteredEleves.length === 0 ? (
                      <div style={{ padding:'12px 16px', color:'var(--text-muted)', fontSize:'0.9rem' }}>Aucun élève trouvé.</div>
                    ) : (
                      filteredEleves.map(e => (
                        <button key={e.id} onClick={()=>{ setSelectedEleve(e); setEleveSearch(`${e.prenom} ${e.nom}`); setForm(p=>({...p,eleve_id:e.id})); }}
                          style={{ display:'block', width:'100%', textAlign:'left', padding:'12px 16px', border:'none', borderBottom:'1px solid var(--border)', background:'transparent', cursor:'pointer' }}
                          onMouseEnter={ev=>ev.currentTarget.style.background='var(--beige)'}
                          onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                          {e.prenom} {e.nom} <span style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>· {e.niveau_scolaire || '—'}</span>
                        </button>
                      ))
                    )}
                  </div>
                )}
              </div>
            </FormField>
          )}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Montant (€)" required error={errors.montant}>
              <input type="number" min={0} step={0.01} style={{ ...appStyles.input, borderColor: errors.montant ? 'var(--red)' : 'var(--border)' }} value={form.montant||''} onChange={e=>{ setForm(p=>({...p,montant:+e.target.value})); setErrors(p=>({...p,montant:''})); }} />
            </FormField>
            <FormField label="Date du paiement" required error={errors.date_paiement}>
              <input type="date" style={{ ...appStyles.input, borderColor: errors.date_paiement ? 'var(--red)' : 'var(--border)' }} value={form.date_paiement||''} onChange={e=>{ setForm(p=>({...p,date_paiement:e.target.value})); setErrors(p=>({...p,date_paiement:''})); }} />
            </FormField>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Mode de paiement">
              <select style={appStyles.input} value={form.mode_paiement||'especes'} onChange={e=>setForm(p=>({...p,mode_paiement:e.target.value}))}>
                {['especes','cheque','virement','carte','autre'].map(m=><option key={m} value={m}>{m.charAt(0).toUpperCase()+m.slice(1)}</option>)}
              </select>
            </FormField>
            <FormField label="Formule">
              <select style={appStyles.input} value={form.formule||'mensuel'} onChange={e=>setForm(p=>({...p,formule:e.target.value}))}>
                {['mensuel','trimestriel','annuel','ponctuel'].map(f=><option key={f} value={f}>{f.charAt(0).toUpperCase()+f.slice(1)}</option>)}
              </select>
            </FormField>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Période début">
              <input type="date" style={appStyles.input} value={form.periode_debut||''} onChange={e=>setForm(p=>({...p,periode_debut:e.target.value}))} />
            </FormField>
            <FormField label="Période fin">
              <input type="date" style={appStyles.input} value={form.periode_fin||''} onChange={e=>setForm(p=>({...p,periode_fin:e.target.value}))} />
            </FormField>
          </div>
          <FormField label="Notes">
            <textarea style={{ ...appStyles.input, resize:'vertical', minHeight:80 }} value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Commentaire éventuel…" />
          </FormField>
          <div style={{ display:'flex', gap:12, justifyContent:'flex-end', marginTop:8 }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setModal(null); setForm({}); setErrors({}); setEleveSearch(''); setSelectedEleve(null); }}>Annuler</button>
            <button style={appStyles.btnSuccess} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </Modal>
      )}

      {confirmDelete && (
        <Modal title="Confirmer la suppression" onClose={()=>setConfirmDelete(null)}>
          <AlertBox type="warning">
            Voulez-vous vraiment supprimer le paiement de <strong>{confirmDelete.eleve_prenom} {confirmDelete.eleve_nom}</strong> ({confirmDelete.montant} €) ?<br />
            Cette action est irréversible.
          </AlertBox>
          <div style={{ display:'flex', gap:12, marginTop:8, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>setConfirmDelete(null)}>Annuler</button>
            <button style={{ ...appStyles.btnPrimary, background:'var(--red)' }} onClick={()=>handleDelete(confirmDelete.id)}>
              <i className="fa-solid fa-trash"></i> Confirmer
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── GROUPES ───────────────────────────────────────────────────────────────
function GroupesScreen({ user }) {
  const [groupes, setGroupes] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({});
  const [errors, setErrors] = React.useState({});
  const [fiche, setFiche] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire');

  React.useEffect(() => { loadGroupes(); }, []);

  const loadGroupes = async () => {
    setLoading(true);
    try {
      const data = await api('/groupes');
      setGroupes(Array.isArray(data) ? data : []);
    } catch (e) {
      setGroupes([]);
    } finally {
      setLoading(false);
    }
  };

  const validate = () => {
    const err = {};
    if (!form.nom?.trim()) err.nom = "Ce champ est obligatoire.";
    if (!form.niveau?.trim()) err.niveau = "Choisissez un niveau.";
    if (!form.type?.trim()) err.type = "Choisissez un type.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      if (modal === 'add') {
        const created = await api('/groupes', { method: 'POST', body: { nom: form.nom, niveau: form.niveau, type: form.type, description: form.description || null } });
        setGroupes(prev => [...prev, created]);
      } else {
        const updated = await api(`/groupes/${form.id}`, { method: 'PUT', body: { nom: form.nom, niveau: form.niveau, type: form.type, description: form.description || null } });
        setGroupes(prev => prev.map(g => g.id === updated.id ? updated : g));
      }
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
    setModal(null); setForm({}); setErrors({});
  };

  const handleDelete = async (id) => {
    try {
      await api(`/groupes/${id}`, { method: 'DELETE' });
      setGroupes(prev => prev.filter(g => g.id !== id));
    } catch (e) {
      alert(e.message || "Impossible d'archiver ce groupe.");
    }
    setConfirmDelete(null);
  };

  const openAdd = () => { setForm({ type: 'niveau' }); setErrors({}); setModal('add'); };
  const openEdit = (g) => { setForm({ ...g }); setErrors({}); setModal('edit'); };

  if (fiche) return <FicheGroupe groupe={fiche} user={user} onBack={()=>setFiche(null)} onUpdate={(u)=>setGroupes(prev=>prev.map(g=>g.id===u.id?u:g))} onDelete={(id)=>setGroupes(prev=>prev.filter(g=>g.id!==id))} />;

  return (
    <div>
      <PageHeader title={`Groupes d'élèves (${groupes.length})`}
        action={canEdit && <button style={appStyles.btnPrimary} onClick={openAdd}><i className="fa-solid fa-plus"></i> Créer un groupe</button>} />

      {loading ? (
        <div style={{ textAlign:'center', padding:40 }}>
          <i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i>
          <p style={{ marginTop:12, color:'var(--text-muted)' }}>Chargement…</p>
        </div>
      ) : groupes.length === 0 ? (
        <AlertBox type="info">Aucun groupe trouvé.</AlertBox>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))', gap:16 }}>
          {groupes.map(g => (
            <div key={g.id} style={appStyles.card}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
                <div>
                  <h3 style={{ fontFamily:'Lora, serif', fontSize:'1.15rem', color:'var(--navy)', marginBottom:6 }}>{g.nom}</h3>
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                    <span style={appStyles.badge('beige')}>{g.niveau || '—'}</span>
                    <span style={appStyles.badge('beige')}>{g.type || 'niveau'}</span>
                  </div>
                </div>
              </div>
              <p style={{ color:'var(--text-muted)', fontSize:'0.9rem', marginBottom:16 }}>{g.description || 'Aucune description.'}</p>
              <div style={{ display:'flex', gap:8 }}>
                <button style={{ ...appStyles.btnSecondary, flex:1, justifyContent:'center', padding:'9px 12px', fontSize:'0.9rem' }} onClick={()=>setFiche(g)}>
                  <i className="fa-solid fa-eye"></i> Voir
                </button>
                {canEdit && (
                  <>
                    <button style={{ ...appStyles.btnSecondary, padding:'9px 12px', fontSize:'0.9rem' }} onClick={()=>openEdit(g)}>
                      <i className="fa-solid fa-pen"></i>
                    </button>
                    <button style={{ padding:'9px 12px', fontSize:'0.9rem', borderRadius:'var(--radius-sm)', border:'2px solid var(--red)', background:'var(--white)', color:'var(--red)', fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6 }} onClick={()=>setConfirmDelete(g)}>
                      <i className="fa-solid fa-trash"></i>
                    </button>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {modal && (
        <Modal title={modal==='add' ? 'Créer un groupe' : 'Modifier le groupe'} onClose={()=>{ setModal(null); setForm({}); setErrors({}); }}>
          <FormField label="Nom du groupe" required error={errors.nom}>
            <input style={{ ...appStyles.input, borderColor: errors.nom ? 'var(--red)' : 'var(--border)' }} value={form.nom||''} onChange={e=>{ setForm(p=>({...p,nom:e.target.value})); setErrors(p=>({...p,nom:''})); }} placeholder="ex : Groupe A — Maths" />
          </FormField>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Niveau" required error={errors.niveau}>
              <select style={{ ...appStyles.input, borderColor: errors.niveau ? 'var(--red)' : 'var(--border)' }} value={form.niveau||''} onChange={e=>{ setForm(p=>({...p,niveau:e.target.value})); setErrors(p=>({...p,niveau:''})); }}>
                <option value="">— Choisir —</option>
                {["CE1","CE2","CM1","CM2","6e","5e","4e","3e"].map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </FormField>
            <FormField label="Type" required error={errors.type}>
              <select style={{ ...appStyles.input, borderColor: errors.type ? 'var(--red)' : 'var(--border)' }} value={form.type||''} onChange={e=>{ setForm(p=>({...p,type:e.target.value})); setErrors(p=>({...p,type:''})); }}>
                <option value="">— Choisir —</option>
                {[{v:'niveau',l:'Par niveau'},{v:'mixte',l:'Mixte'},{v:'special',l:'Spécial'}].map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
              </select>
            </FormField>
          </div>
          <FormField label="Description" hint="Quelques mots pour reconnaître ce groupe facilement.">
            <textarea style={{ ...appStyles.input, resize:'vertical', minHeight:80 }} value={form.description||''} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="ex : Cours du lundi et vendredi matin" />
          </FormField>
          <div style={{ display:'flex', gap:12, justifyContent:'flex-end', marginTop:8 }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setModal(null); setForm({}); setErrors({}); }}>Annuler</button>
            <button style={appStyles.btnPrimary} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </Modal>
      )}

      {confirmDelete && (
        <Modal title="Confirmer l'archivage" onClose={()=>setConfirmDelete(null)}>
          <AlertBox type="warning">
            Voulez-vous vraiment archiver le groupe <strong>{confirmDelete.nom}</strong> ?<br />
            Cette action est réversible depuis la base de données.
          </AlertBox>
          <div style={{ display:'flex', gap:12, marginTop:8, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>setConfirmDelete(null)}>Annuler</button>
            <button style={{ ...appStyles.btnPrimary, background:'var(--red)' }} onClick={()=>handleDelete(confirmDelete.id)}>
              <i className="fa-solid fa-trash"></i> Confirmer
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function FicheGroupe({ groupe: initialGroupe, user, onBack, onUpdate, onDelete }) {
  const [loading, setLoading] = React.useState(true);
  const [groupe, setGroupe] = React.useState(null);
  const [stats, setStats] = React.useState(null);
  const [allEleves, setAllEleves] = React.useState([]);
  const [editMode, setEditMode] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [errors, setErrors] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const [eleveSearch, setEleveSearch] = React.useState('');
  const [selectedEleve, setSelectedEleve] = React.useState(null);
  const [saved, setSaved] = React.useState(false);
  const canEdit = user && (user.role === 'admin' || user.role === 'secretaire');

  React.useEffect(() => { loadData(); }, [initialGroupe.id]);

  const loadData = async () => {
    setLoading(true);
    try {
      const [gData, sData, eData] = await Promise.all([
        api(`/groupes/${initialGroupe.id}`),
        api(`/groupes/${initialGroupe.id}/stats`),
        api('/eleves?statut=actif')
      ]);
      setGroupe(gData);
      setStats(sData);
      setAllEleves(Array.isArray(eData) ? eData : []);
    } catch (e) {
      setGroupe(initialGroupe);
      setAllEleves([]);
    } finally {
      setLoading(false);
    }
  };

  const startEdit = () => {
    setForm({ nom: groupe.nom, niveau: groupe.niveau || '', type: groupe.type || 'niveau', description: groupe.description || '' });
    setErrors({});
    setEditMode(true);
  };

  const validate = () => {
    const err = {};
    if (!form.nom?.trim()) err.nom = "Ce champ est obligatoire.";
    if (!form.niveau?.trim()) err.niveau = "Choisissez un niveau.";
    if (!form.type?.trim()) err.type = "Choisissez un type.";
    return err;
  };

  const handleSave = async () => {
    const err = validate();
    if (Object.keys(err).length > 0) { setErrors(err); return; }
    try {
      const updated = await api(`/groupes/${groupe.id}`, { method: 'PUT', body: { nom: form.nom, niveau: form.niveau, type: form.type, description: form.description || null } });
      setGroupe(prev => ({ ...prev, ...updated }));
      setEditMode(false);
      setSaved(true);
      setTimeout(()=>setSaved(false), 3000);
      if (onUpdate) onUpdate(updated);
    } catch (e) {
      alert(e.message || "Erreur lors de la sauvegarde.");
    }
  };

  const handleDelete = async () => {
    try {
      await api(`/groupes/${groupe.id}`, { method: 'DELETE' });
      if (onDelete) onDelete(groupe.id);
      onBack();
    } catch (e) {
      alert(e.message || "Impossible d'archiver ce groupe.");
    }
    setConfirmDelete(false);
  };

  const handleAddEleve = async () => {
    if (!selectedEleve) return;
    try {
      await api(`/groupes/${groupe.id}/eleves`, { method: 'POST', body: { eleve_id: selectedEleve.id } });
      const updated = await api(`/groupes/${groupe.id}`);
      setGroupe(updated);
      setSelectedEleve(null);
      setEleveSearch('');
    } catch (e) {
      alert(e.message || "Impossible d'ajouter cet élève.");
    }
  };

  const handleRemoveEleve = async (eleveId) => {
    if (!confirm("Retirer cet élève du groupe ?")) return;
    try {
      await api(`/groupes/${groupe.id}/eleves/${eleveId}`, { method: 'DELETE' });
      const updated = await api(`/groupes/${groupe.id}`);
      setGroupe(updated);
    } catch (e) {
      alert(e.message || "Impossible de retirer cet élève.");
    }
  };

  if (loading) {
    return (
      <div style={{ textAlign:'center', padding:40 }}>
        <i className="fa-solid fa-spinner fa-spin" style={{ fontSize:'2rem', color:'var(--navy)' }}></i>
        <p style={{ marginTop:12, color:'var(--text-muted)' }}>Chargement de la fiche…</p>
      </div>
    );
  }

  const groupeEleves = groupe?.eleves || [];
  const groupeCours = groupe?.cours || [];
  const tauxPresence = stats?.tauxPresence ? Math.round(stats.tauxPresence) : 0;

  const filteredEleves = allEleves.filter(e => {
    const alreadyIn = groupeEleves.some(ge => ge.id === e.id);
    const search = (e.nom + ' ' + e.prenom).toLowerCase();
    return !alreadyIn && search.includes(eleveSearch.toLowerCase());
  });

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, flexWrap:'wrap' }}>
        <button style={appStyles.btnSecondary} onClick={onBack}>
          <i className="fa-solid fa-arrow-left"></i> Retour à la liste
        </button>
        {canEdit && !editMode && (
          <button style={appStyles.btnSecondary} onClick={startEdit}>
            <i className="fa-solid fa-pen"></i> Modifier
          </button>
        )}
        {canEdit && !editMode && (
          <button style={{ ...appStyles.btnSecondary, borderColor:'var(--red)', color:'var(--red)' }} onClick={()=>setConfirmDelete(true)}>
            <i className="fa-solid fa-trash"></i> Archiver
          </button>
        )}
      </div>

      {saved && <AlertBox type="success">Modifications enregistrées avec succès.</AlertBox>}

      <div style={appStyles.card}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:20, flexWrap:'wrap' }}>
          <div style={{ width:72, height:72, borderRadius:'50%', background:'var(--navy)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', flexShrink:0, fontFamily:'Lora, serif', fontSize:'1.6rem', fontWeight:700 }}>
            <i className="fa-solid fa-users" style={{ fontSize:'1.8rem' }}></i>
          </div>
          <div style={{ flex:1 }}>
            <h2 style={{ fontFamily:'Lora, serif', fontSize:'1.6rem', color:'var(--navy)' }}>{groupe.nom}</h2>
            <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginTop:8 }}>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-book-open"></i> {groupe.niveau || '—'}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-layer-group"></i> {groupe.type || 'niveau'}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-user-graduate"></i> {groupeEleves.length} élève{groupeEleves.length>1?'s':''}</span>
              <span style={appStyles.badge('beige')}><i className="fa-solid fa-chart-pie"></i> Présence {tauxPresence}%</span>
            </div>
          </div>
        </div>
      </div>

      {editMode ? (
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Modifier les informations</h3>
          <FormField label="Nom" required error={errors.nom}>
            <input style={{ ...appStyles.input, borderColor: errors.nom?'var(--red)':'var(--border)' }} value={form.nom||''} onChange={e=>{ setForm(p=>({...p,nom:e.target.value})); setErrors(p=>({...p,nom:''})); }} />
          </FormField>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <FormField label="Niveau" required error={errors.niveau}>
              <select style={{ ...appStyles.input, borderColor: errors.niveau?'var(--red)':'var(--border)' }} value={form.niveau||''} onChange={e=>{ setForm(p=>({...p,niveau:e.target.value})); setErrors(p=>({...p,niveau:''})); }}>
                <option value="">— Choisir —</option>
                {["CE1","CE2","CM1","CM2","6e","5e","4e","3e"].map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </FormField>
            <FormField label="Type" required error={errors.type}>
              <select style={{ ...appStyles.input, borderColor: errors.type?'var(--red)':'var(--border)' }} value={form.type||''} onChange={e=>{ setForm(p=>({...p,type:e.target.value})); setErrors(p=>({...p,type:''})); }}>
                <option value="">— Choisir —</option>
                {[{v:'niveau',l:'Par niveau'},{v:'mixte',l:'Mixte'},{v:'special',l:'Spécial'}].map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
              </select>
            </FormField>
          </div>
          <FormField label="Description">
            <textarea style={{ ...appStyles.input, resize:'vertical', minHeight:80 }} value={form.description||''} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="ex : Cours du lundi et vendredi matin" />
          </FormField>
          <div style={{ display:'flex', gap:12, marginTop:20, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>{ setEditMode(false); setErrors({}); }}>Annuler</button>
            <button style={appStyles.btnPrimary} onClick={handleSave}><i className="fa-solid fa-floppy-disk"></i> Enregistrer</button>
          </div>
        </div>
      ) : (
        <div style={appStyles.card}>
          <h3 style={appStyles.sectionTitle}>Informations</h3>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:12 }}>
            {[ ["Nom", groupe.nom, "users"], ["Niveau", groupe.niveau || '—', "book-open"], ["Type", groupe.type || 'niveau', "layer-group"], ["Description", groupe.description || '—', "align-left"] ].map(([k,v,ico])=>(
              <div key={k} style={{ display:'flex', flexDirection:'column', gap:4, padding:'10px 14px', background:'var(--beige)', borderRadius:'var(--radius-sm)' }}>
                <span style={{ color:'var(--text-muted)', fontSize:'0.85rem', display:'flex', alignItems:'center', gap:6 }}>
                  <i className={`fa-solid fa-${ico}`} style={{ width:14 }}></i>{k}
                </span>
                <span style={{ fontWeight:600, fontSize:'1rem' }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))', gap:16, marginTop:16 }}>
        {/* ÉLÈVES DU GROUPE */}
        <div style={{ ...appStyles.card, gridColumn: groupeCours.length===0 ? '1 / -1' : undefined }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:10 }}>
            <h3 style={appStyles.sectionTitle}>Élèves du groupe ({groupeEleves.length})</h3>
          </div>

          {canEdit && (
            <div style={{ marginBottom:16 }}>
              <div style={{ position:'relative', marginBottom:8 }}>
                <i className="fa-solid fa-magnifying-glass" style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', pointerEvents:'none' }}></i>
                <input style={{ ...appStyles.input, paddingLeft:42 }} value={eleveSearch} onChange={e=>{ setEleveSearch(e.target.value); setSelectedEleve(null); }} placeholder="Rechercher un élève à ajouter…" />
              </div>
              {eleveSearch && (
                <div style={{ maxHeight:160, overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'var(--white)' }}>
                  {filteredEleves.length === 0 ? (
                    <div style={{ padding:'10px 14px', color:'var(--text-muted)', fontSize:'0.9rem' }}>Aucun élève trouvé.</div>
                  ) : (
                    filteredEleves.map(e => (
                      <button key={e.id} onClick={()=>{ setSelectedEleve(e); setEleveSearch(e.prenom + ' ' + e.nom); }}
                        style={{ display:'block', width:'100%', textAlign:'left', padding:'10px 14px', border:'none', borderBottom:'1px solid var(--border)', background:'transparent', cursor:'pointer', fontSize:'0.95rem', color:'var(--text)' }}
                        onMouseEnter={ev=>ev.currentTarget.style.background='var(--beige)'}
                        onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                        {e.prenom} {e.nom} <span style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>· {e.niveau_scolaire || '—'}</span>
                      </button>
                    ))
                  )}
                </div>
              )}
              {selectedEleve && (
                <button style={{ ...appStyles.btnSuccess, marginTop:8, padding:'9px 16px', fontSize:'0.9rem' }} onClick={handleAddEleve}>
                  <i className="fa-solid fa-plus"></i> Ajouter {selectedEleve.prenom} {selectedEleve.nom}
                </button>
              )}
            </div>
          )}

          {groupeEleves.length === 0 ? (
            <AlertBox type="info">Aucun élève dans ce groupe.</AlertBox>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {groupeEleves.map(e => (
                <div key={e.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ width:36, height:36, borderRadius:'50%', background:'var(--navy)', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:'0.85rem' }}>
                      {e.prenom?.[0]}{e.nom?.[0]}
                    </div>
                    <div>
                      <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{e.prenom} {e.nom}</div>
                      <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{e.niveau_scolaire || '—'}</div>
                    </div>
                  </div>
                  {canEdit && (
                    <button style={{ background:'none', border:'none', color:'var(--red)', cursor:'pointer', fontSize:'1rem', padding:'4px 8px' }} onClick={()=>handleRemoveEleve(e.id)} title="Retirer du groupe">
                      <i className="fa-solid fa-xmark"></i>
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* COURS ASSOCIÉS */}
        {groupeCours.length > 0 && (
          <div style={appStyles.card}>
            <h3 style={appStyles.sectionTitle}>Cours associés ({groupeCours.length})</h3>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {groupeCours.map(c => (
                <div key={c.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, borderBottom:'1px solid var(--border)' }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:'0.95rem' }}>{c.matiere}</div>
                    <div style={{ color:'var(--text-muted)', fontSize:'0.85rem' }}>{c.jour_semaine !== undefined ? ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][c.jour_semaine] : '—'} · {c.heure_debut || '—'} – {c.heure_fin || '—'} · {c.salle || '—'}</div>
                  </div>
                  <span style={appStyles.badge('beige')}><i className="fa-solid fa-chalkboard-user"></i> {c.titre || '—'}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {confirmDelete && (
        <Modal title="Confirmer l'archivage" onClose={()=>setConfirmDelete(false)}>
          <AlertBox type="warning">
            Voulez-vous vraiment archiver le groupe <strong>{groupe.nom}</strong> ?<br />
            Cette action est réversible depuis la base de données.
          </AlertBox>
          <div style={{ display:'flex', gap:12, marginTop:8, justifyContent:'flex-end' }}>
            <button style={appStyles.btnSecondary} onClick={()=>setConfirmDelete(false)}>Annuler</button>
            <button style={{ ...appStyles.btnPrimary, background:'var(--red)' }} onClick={handleDelete}>
              <i className="fa-solid fa-trash"></i> Confirmer
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}
